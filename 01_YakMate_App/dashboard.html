<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root {
    --primary-container: #00e5ff;
    --background: #0b0e14;
    --surface-container: #1d2026;
    --surface-high: #272a31;
    --on-surface: #e1e2eb;
    --glass: rgba(29, 32, 38, 0.7);
    --gold: #D4AF37;
}

body.light-mode {
    --background: #fdfdfd;
    --on-surface: #1a1d23;
    --surface-container: #ffffff;
    --surface-high: #f0f2f5;
    --glass: rgba(255, 255, 255, 0.9);
    --gold: #8d6e63;
    --primary-container: #7c4dff;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
body { 
    font-family: 'Manrope', 'Noto Sans KR', sans-serif; 
    background: var(--background); 
    color: var(--on-surface);
    min-height: 100vh;
    padding-bottom: 120px;
}

.header { padding: 32px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(11, 14, 20, 0.8); backdrop-filter: blur(20px); z-index: 100; }
.header-left { display: flex; flex-direction: column; gap: 4px; }
.header-title { font-size: 14px; font-weight: 500; opacity: 0.5; letter-spacing: 0.5px; }
.header-sub { font-size: 20px; font-weight: 700; color: #fff; }
.header-right { display: flex; align-items: center; gap: 16px; }
.user-avatar { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, var(--primary-container) 0%, #7c4dff 100%); display: flex; align-items: center; justify-content: center; color: #000; font-weight: 800; font-size: 18px; box-shadow: 0 8px 20px rgba(0, 229, 255, 0.3); }
.btn-logout { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 10px 16px; font-size: 12px; color: rgba(255, 255, 255, 0.4); cursor: pointer; font-family: inherit; font-weight: 600; }

.content { padding: 0 24px; }

/* Bio-Liquid Gauge Card */
.progress-card { 
    background: var(--glass); 
    border-radius: 40px; 
    padding: 32px; 
    margin-top: 16px;
    margin-bottom: 32px; 
    border: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow: hidden;
}

.gauge-container { width: 180px; height: 180px; position: relative; margin-bottom: 24px; }
.gauge-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.gauge-bg { fill: none; stroke: rgba(255, 255, 255, 0.03); stroke-width: 12; }
.gauge-fill { fill: none; stroke: url(#gauge-gradient); stroke-width: 12; stroke-linecap: round; transition: stroke-dasharray 1s cubic-bezier(0.4, 0, 0.2, 1); }

.gauge-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
.gauge-percent { font-size: 40px; font-weight: 800; color: #fff; font-family: 'Space Grotesk', sans-serif; display: block; }
.gauge-label { font-size: 12px; opacity: 0.4; font-weight: 600; margin-top: -4px; display: block; }

.progress-info-text { text-align: center; }
.progress-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.progress-sub { font-size: 13px; color: var(--primary-container); font-weight: 600; opacity: 0.8; }

.section-title { font-size: 16px; font-weight: 700; color: var(--gold); margin: 40px 0 20px; display: flex; align-items: center; gap: 8px; }

.med-list { display: flex; flex-direction: column; gap: 14px; }
.med-card { 
    background: var(--glass); 
    border-radius: 28px; 
    padding: 24px; 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    border: 1px solid rgba(255, 255, 255, 0.03);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
}
.med-card.taken { background: rgba(0, 229, 255, 0.05); border-color: rgba(0, 229, 255, 0.2); }
.med-time { font-size: 12px; font-weight: 600; color: var(--primary-container); margin-bottom: 4px; opacity: 0.6; }
.med-name { font-size: 17px; font-weight: 700; color: #fff; }
.med-check { width: 44px; height: 44px; border-radius: 16px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); display: flex; align-items: center; justify-content: center; font-size: 20px; transition: all 0.3s; }
.med-card.taken .med-check { background: var(--primary-container); border-color: var(--primary-container); color: #000; box-shadow: 0 0 15px rgba(0, 229, 255, 0.4); }

.bottom-nav { position: fixed; bottom: 24px; left: 24px; right: 24px; background: rgba(16, 19, 26, 0.9); backdrop-filter: blur(20px); border-radius: 24px; padding: 12px; display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid rgba(255, 255, 255, 0.05); z-index: 100; }
.nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(225, 226, 235, 0.3); font-size: 11px; text-decoration: none; gap: 4px; transition: all 0.3s; }
.nav-item.active { color: var(--primary-container); }
.nav-icon { font-size: 22px; }

/* Invisible original progress elements to keep the script happy */
#progress-bar { display: none; }
</style>
</head>

import{initializeApp}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-app.js";
import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-auth.js";
import{getFirestore,doc,getDoc,setDoc}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-firestore.js";
const config={apiKey:"AIzaSyDpnPJnErnrTloHk3HFrsXHORUMvAiOq5w",authDomain:"pill-sajangnim.firebaseapp.com",projectId:"pill-sajangnim",storageBucket:"pill-sajangnim.firebasestorage.app",messagingSenderId:"648268791992",appId:"1:648268791992:web:41a92580aa1a58ae6bb44d"};
const app=initializeApp(config);
const auth=getAuth(app);
const db=getFirestore(app);
let meds=[
  {id:'m1',name:'아침 약',time:'08:00',taken:false},
  {id:'m2',name:'점심 약',time:'13:00',taken:false},
  {id:'m3',name:'저녁 약',time:'19:00',taken:false},
];
onAuthStateChanged(auth,async(u)=>{
  let user = u;
  if(!user){
    const kakaoData = localStorage.getItem('yakmate_kakao_user');
    if(kakaoData) user = JSON.parse(kakaoData);
  }
  if(!user){window.location.href='./index.html';return;}
  const name=user.displayName||'사장님';
  document.getElementById('user-name').textContent=name+'님';
  const avatar = document.getElementById('user-avatar');
  if(user.photoURL && avatar) {
    avatar.innerHTML = `<img src="${user.photoURL}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
  } else if(avatar) {
    avatar.textContent=name[0];
  }
  const getKstDate = (d = new Date()) => {
    const offset = 9 * 60 * 60 * 1000;
    const kst = new Date(d.getTime() + offset);
    return kst.toISOString().split('T')[0];
  };
  const today = getKstDate();
  const ref=doc(db,'users',user.uid,'daily',today);
  const snap=await getDoc(ref);
  
  if(snap.exists() && snap.data().meds) {
    meds = snap.data().meds;
  } else {
    // 오늘 기록이 없으면 설정된 마스터 루틴 불러오기
    const rRef = doc(db, 'users', user.uid, 'settings', 'routine');
    const rSnap = await getDoc(rRef);
    if(rSnap.exists() && rSnap.data().meds) {
      meds = rSnap.data().meds.map(m => ({...m, taken: false}));
    } else {
      // 마스터 루틴도 없으면 기본값 사용
      meds = [
        {id:'m1',name:'아침 약',time:'08:00',taken:false},
        {id:'m2',name:'점심 약',time:'13:00',taken:false},
        {id:'m3',name:'저녁 약',time:'19:00',taken:false}
      ];
    }
    // 오늘 날짜 데이터로 초기 저장
    await setDoc(ref, { meds, updatedAt: new Date() });
  }
  renderMeds();
});
document.getElementById('btn-logout').addEventListener('click',async()=>{
  await signOut(auth);
  window.location.href='./index.html';
});

    "사장님, 오늘도 반가운 얼굴들과 인사 나누세요 👋",
    "오늘도 건강한 에너지 뿜뿜! 힘내세요 💪",
    "사장님의 존재만으로도 큰 위로가 됩니다 🧸",
    "오늘도 약속한 시간에 약 잘 드시기! 🤙",
    "사장님, 오늘 하루도 보석처럼 빛내주세요 💍",
    "오늘도 감사함으로 가득 찬 하루 되시길... 🤲",
    "사장님의 건강 전도사, 약메이트 올림 🙇",
    "오늘도 든든한 약메이트와 함께해요! 🛡️",
    "사장님, 오늘도 건강하고 즐거운 여행 되세요 ✈️"
];

function setGreeting() {
    const titleEl = document.querySelector('.header-title');
    if(titleEl) {
        const randomIndex = Math.floor(Math.random() * greetings.length);
        titleEl.textContent = greetings[randomIndex];
    }
}

setGreeting();
function renderMeds(){
  const list=document.getElementById('med-list');
  list.innerHTML='';
  let taken=0;
  meds.forEach(med=>{
    if(med.taken)taken++;
    const card=document.createElement('div');
    card.className='med-card'+(med.taken?' taken':'');
    card.innerHTML=`<div><div class="med-time">${med.taken?'잘 드셨어요':med.time}</div><div class="med-name">${med.time} 약 드실 시간</div></div><div class="med-check">${med.taken?'✅':''}</div>`;
    card.onclick=()=>toggleMed(med.id);
    list.appendChild(card);
  });
  const pct = meds.length > 0 ? Math.round(taken/meds.length*100) : 0;
  document.getElementById('progress-title').textContent=meds.length > 0 ? taken+'/'+meds.length+'번 챙겨드셨어요' : '설정된 일정이 없습니다';
  
  // 복약 진행도 업데이트
  const progressBar = document.getElementById('progress-bar');
  if(progressBar) progressBar.style.width=pct+'%';
  
  document.getElementById('progress-percent').textContent=pct+'%';
  
  // 게이지 업데이트
  const offset = 276.5 - (276.5 * pct / 100);
  const gaugeFill = document.getElementById('gauge-fill');
  if(gaugeFill) gaugeFill.style.strokeDasharray = `${276.5 - offset} 276.5`;
}
async function toggleMed(id){
  const med=meds.find(m=>m.id===id);
  if(med){
    med.taken=!med.taken;
    
    // 사장님이 생각지도 못한 새로운 기능: 칭찬 대답 (Toast)
    if(med.taken) {
        showPraise();
    }
    
    renderMeds();
    const user=auth.currentUser;
    if(user){
      const today = getKstDate();
      await setDoc(doc(db,'users',user.uid,'daily',today),{meds,updatedAt:new Date()});
    }
  }
}

function showPraise() {
    const praises = [
        "참 잘하셨어요! 건강해지는 소리가 들리네요 💖",
        "잊지 않고 챙기시는 모습이 너무 멋져요! ✨",
        "오늘도 건강을 위해 한 걸음 더 나아가셨네요 🌸",
        "사장님의 건강을 제가 항상 응원하고 있어요 🍀",
        "정말 대단하세요! 꾸준함이 최고의 보약이에요 🍯"
    ];
    const msg = praises[Math.floor(Math.random() * praises.length)];
    const toast = document.createElement('div');
    toast.style = "position:fixed; bottom:140px; left:50%; transform:translateX(-50%); background:rgba(0,229,255,0.9); color:#000; padding:16px 24px; border-radius:30px; font-weight:700; font-size:14px; z-index:1000; box-shadow:0 10px 25px rgba(0,229,255,0.4); animation: fadeInUp 0.5s ease-out;";
    toast.innerHTML = `🌟 ${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => {
        toast.style.animation = "fadeOutDown 0.5s ease-in forwards";
        setTimeout(() => toast.remove(), 500);
    }, 2500);
}

// 건강 팁 무작위 표시
function setHealthTip() {
    const tips = [
        "오늘 날씨가 쌀쌀해요. 따뜻한 물 한 잔으로 몸을 녹여보세요. ☕",

        "오늘 점심은 맛있는 거 드셨나요? 건강한 식사가 최고의 약이에요. 🍱",
        "햇볕을 10분만 쬐어도 비타민 D가 생겨 뼈가 튼튼해져요. ☀️"

// 애니메이션 스타일 추가
const style = document.createElement('style');
style.textContent = `
    @keyframes fadeInUp { from { opacity:0; transform:translate(-50%, 20px); } to { opacity:1; transform:translate(-50%, 0); } }
    @keyframes fadeOutDown { from { opacity:1; transform:translate(-50%, 0); } to { opacity:0; transform:translate(-50%, 20px); } }
`;
document.head.appendChild(style);

setHealthTip();

// 실시간 복약 알람 로직
let lastAlarmedTime = '';
function checkAlarms() {
    if (!meds || meds.length === 0 || Notification.permission !== 'granted') return;
    
    const now = new Date();
    const currentTime = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
    
    if (currentTime === lastAlarmedTime) return; // 같은 분에는 한 번만 알람
    
    meds.forEach(med => {
        if (!med.taken && med.time === currentTime) {
            // 알람 발생
            const isSound = localStorage.getItem('toggle-sound') !== 'false';
            const isVibrate = localStorage.getItem('toggle-vibrate') !== 'false';
            
            new Notification("약 드실 시간이에요! 💊", {
                body: `지금 [${med.name}] 복용 시간입니다. 잊지 마세요!`,
                icon: "favicon.ico",
                requireInteraction: true,
                silent: !isSound // 시스템 알림 소리 제어
            });

            // 진동 발생
            if (isVibrate && "vibrate" in navigator) {
                navigator.vibrate([200, 100, 200, 100, 200]);
            }

            // 커스텀 소리 재생 (시스템 소리와 별도로 확실한 알람을 위해)
            if (isSound) {
                const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
                audio.play().catch(e => console.log("Audio play failed:", e));
            }
            
            lastAlarmedTime = currentTime;
        }
    });
}
setInterval(checkAlarms, 30000); // 30초마다 체크
