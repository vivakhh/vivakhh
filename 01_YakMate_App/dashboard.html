<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YakMate | Home</title>

</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-sub">사장님을 위한 따뜻한 아침</div>
      <div class="header-title">오늘도 빛나는 하루 ✨</div>
    </div>
    <button class="avatar-btn" onclick="location.href='profile.html'">
      <div id="user-avatar" class="avatar">👤</div>
    </button>
  </div>

  <div class="card">
    <div class="gauge-wrap">
      <svg viewBox="0 0 120 120" width="160" height="160">
        <circle cx="60" cy="60" r="50" fill="none" stroke="var(--border)" stroke-width="10"/>
        <circle id="gauge-ring" cx="60" cy="60" r="50" fill="none" stroke="var(--primary)" stroke-width="10"
          stroke-dasharray="314" stroke-dashoffset="314" stroke-linecap="round"
          transform="rotate(-90 60 60)" style="transition:stroke-dashoffset 0.5s"/>
        <circle cx="60" cy="10" r="5" fill="var(--primary)"/>
      </svg>
      <div class="gauge-center">
        <div id="gauge-pct" class="gauge-pct">0%</div>
      </div>
    </div>
    <div id="gauge-msg" class="gauge-msg">소중한 나를 위한 오늘의 실천</div>
  </div>

  <div class="card nudge-card">
    <div class="nudge-title">❤️ 가족의 따뜻한 넛지 <button class="nudge-btn">👥 가족 케어 활성</button></div>
    <div class="nudge-text">"사장님, 오늘 약 드셨나요? 항상 응원하고 있어요 ❤️"</div>
  </div>

  <div class="card">
    <div class="section-title">오늘의 약 복용 💊</div>
    <div id="med-list"></div>
  </div>

  <div class="card">
    <div class="routine-header">
      <span>⏰ 오늘의 건강 루틴</span>
      <button onclick="location.href='routine.html'" class="change-btn">변경하기</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="location.href='dashboard.html'">
    <span>🏠</span><span>HOME</span>
  </button>
  <button class="nav-btn" onclick="location.href='health.html'">
    <span>📊</span><span>HEALTH</span>
  </button>
  <button class="nav-btn" onclick="location.href='story.html'">
    <span>💬</span><span>STORY</span>
  </button>
  <button class="nav-btn" onclick="location.href='center.html'">
    <span>👤</span><span>CENTER</span>
  </button>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.17.2/firebase-firestore.js";

const config = {
  apiKey: "AIzaSyDpnPJnErnrTloHk3HFrsXHORUMvAiOq5w",
  authDomain: "pill-sajangnim.firebaseapp.com",
  projectId: "pill-sajangnim",
  storageBucket: "pill-sajangnim.firebasestorage.app",
  messagingSenderId: "648268791992",
  appId: "1:648268791992:web:41a92580aa1a58ae6bb44d"
};

const app = initializeApp(config);
const auth = getAuth(app);
const db = getFirestore(app);

const DEFAULT_MEDS = [
  { id: "m1", name: "아침 💊", time: "08:00", taken: false },
  { id: "m2", name: "점심 💊", time: "13:00", taken: false },
  { id: "m3", name: "저녁 💊", time: "19:00", taken: false }
];

let meds = [];
const today = new Date(Date.now() + 9*60*60*1000).toISOString().split('T')[0];

onAuthStateChanged(auth, async (firebaseUser) => {
  const storedStr = localStorage.getItem('yakmate_user');
  const storedUser = storedStr ? JSON.parse(storedStr) : null;

  if (!firebaseUser && !storedUser) {
    window.location.href = './index.html';
    return;
  }

  const uid = firebaseUser?.uid || storedUser?.uid;
  const name = firebaseUser?.displayName || storedUser?.displayName || '사장님';
  document.querySelector('.header-sub').textContent = name + '을 위한 따뜻한 아침';

  if (storedUser?.isGuest) {
    const saved = localStorage.getItem('yakmate_guest_' + today);
    meds = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_MEDS));
    renderMeds();
    return;
  }

  try {
    const dailyRef = doc(db, 'users', uid, 'daily', today);
    const dailySnap = await getDoc(dailyRef);

    if (dailySnap.exists() && dailySnap.data().meds && dailySnap.data().meds.length > 0) {
      meds = dailySnap.data().meds;
    } else {
      const routineRef = doc(db, 'users', uid, 'settings', 'routine');
      const routineSnap = await getDoc(routineRef);
      if (routineSnap.exists() && routineSnap.data().meds && routineSnap.data().meds.length > 0) {
        meds = routineSnap.data().meds.map(m => ({ ...m, taken: false }));
      } else {
        meds = JSON.parse(JSON.stringify(DEFAULT_MEDS));
      }
      await setDoc(dailyRef, { meds, date: today, updatedAt: new Date() });
    }
  } catch(e) {
    console.error(e);
    meds = JSON.parse(JSON.stringify(DEFAULT_MEDS));
  }

  renderMeds();
});

function renderMeds() {
  const list = document.getElementById('med-list');
  if (!meds || meds.length === 0) {
    list.innerHTML = '<p style="text-align:center;opacity:0.5;padding:16px;">약을 추가하면 여기에 표시돼요 💊</p>';
    updateGauge(0);
    return;
  }

  const groups = {};
  meds.forEach((med, idx) => {
    const key = med.time || '00:00';
    if (!groups[key]) groups[key] = [];
    groups[key].push({ ...med, idx });
  });

  list.innerHTML = '';
  let takenCount = 0;
  meds.forEach(m => { if (m.taken) takenCount++; });

  Object.keys(groups).sort().forEach(time => {
    const group = groups[time];
    const header = document.createElement('div');
    header.className = 'time-header';
    const h = parseInt(time.split(':')[0]);
    const m = time.split(':')[1];
    header.textContent = (h < 12 ? '오전 ' : '오후 ') + (h === 0 ? 12 : h > 12 ? h - 12 : h) + ':' + m;
    list.appendChild(header);

    const card = document.createElement('div');
    card.className = 'med-card';
    group.forEach((med, i) => {
      const row = document.createElement('div');
      row.className = 'med-row' + (i > 0 ? ' border-top' : '');
      row.innerHTML =
        '<div class="med-info"><span class="med-icon">💊</span>' +
        '<span class="med-name' + (med.taken ? ' taken' : '') + '">' + med.name + '</span></div>' +
        '<button class="check-btn' + (med.taken ? ' checked' : '') + '" onclick="handleTaken(' + med.idx + ')">' +
        (med.taken ? '✅' : '⭕') + '</button>';
      card.appendChild(row);
    });
    list.appendChild(card);
  });

  updateGauge(Math.round((takenCount / meds.length) * 100));
}

function updateGauge(pct) {
  document.getElementById('gauge-pct').textContent = pct + '%';
  const ring = document.getElementById('gauge-ring');
  const circumference = 2 * Math.PI * 50;
  ring.style.strokeDashoffset = circumference - (pct / 100) * circumference;
  document.getElementById('gauge-msg').textContent =
    pct === 100 ? '오늘 약속을 다 지키셨어요! 🎉' : '소중한 나를 위한 오늘의 실천';
}

window.handleTaken = async function(idx) {
  meds[idx].taken = !meds[idx].taken;
  const storedStr = localStorage.getItem('yakmate_user');
  const storedUser = storedStr ? JSON.parse(storedStr) : null;

  if (storedUser?.isGuest) {
    localStorage.setItem('yakmate_guest_' + today, JSON.stringify(meds));
  } else {
    try {
      const uid = auth.currentUser?.uid || storedUser?.uid;
      if (uid) {
        const dailyRef = doc(db, 'users', uid, 'daily', today);
        await setDoc(dailyRef, { meds, date: today, updatedAt: new Date() });
      }
    } catch(e) { console.error(e); }
  }
  renderMeds();
};
</script>
</body>
</html>
