<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YakMate - Family Care</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root {
    --primary-container: #00e5ff;
    --background: #0b0e14;
    --surface-container: #1d2026;
    --surface-high: #272a31;
    --on-surface: #e1e2eb;
    --glass: rgba(29, 32, 38, 0.7);
    --gold: #D4AF37;
    --success: #10B981;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
body { 
    font-family: 'Manrope', 'Noto Sans KR', sans-serif; 
    background: var(--background); 
    color: var(--on-surface);
    min-height: 100vh;
    padding-bottom: 120px;
}

.header { padding: 32px 24px 16px; }
.header-title { font-size: 24px; font-weight: 700; color: #fff; }
.header-sub { font-size: 14px; opacity: 0.5; margin-top: 4px; }

.info-banner { margin: 0 24px 32px; background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(0, 229, 255, 0.05) 100%); border-radius: 28px; padding: 24px; border: 1px solid rgba(212, 175, 55, 0.2); }
.info-text { font-size: 14px; line-height: 1.6; color: var(--on-surface); opacity: 0.9; }

.section-title { padding: 0 24px; font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
.guardian-count { font-size: 13px; color: var(--primary-container); font-weight: 400; }

.guardian-list { padding: 0 24px; margin-bottom: 32px; }
.guardian-card { background: var(--glass); border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid rgba(255, 255, 255, 0.05); display: flex; align-items: center; gap: 16px; }
.guardian-avatar { width: 48px; height: 48px; border-radius: 16px; background: var(--surface-high); display: flex; align-items: center; justify-content: center; font-size: 20px; }
.guardian-info { flex: 1; }
.guardian-name { font-size: 16px; font-weight: 700; color: #fff; }
.guardian-relation { font-size: 12px; opacity: 0.4; margin-top: 2px; }
.btn-delete { background: none; border: none; color: rgba(255, 255, 255, 0.2); cursor: pointer; padding: 8px; }

.add-section { padding: 0 24px; margin-bottom: 32px; }
.add-card { background: var(--glass); border-radius: 28px; padding: 24px; border: 1px solid rgba(255, 255, 255, 0.03); }
.input-group { margin-bottom: 16px; }
.input-label { font-size: 12px; opacity: 0.4; margin-bottom: 8px; display: block; }
.input-field { width: 100%; background: var(--surface-high); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 14px; padding: 14px; color: #fff; font-family: inherit; outline: none; }
.relation-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px; }
.relation-btn { background: var(--surface-high); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 10px 4px; color: rgba(255, 255, 255, 0.4); font-size: 12px; cursor: pointer; transition: all 0.3s; }
.relation-btn.active { background: rgba(0, 229, 255, 0.1); border-color: var(--primary-container); color: var(--primary-container); }
.btn-add { width: 100%; background: var(--primary-container); color: #000; border: none; border-radius: 16px; padding: 16px; font-weight: 700; margin-top: 16px; cursor: pointer; }

.kakao-section { padding: 0 24px; }
.btn-kakao { width: 100%; background: #FEE500; color: #191919; border: none; border-radius: 16px; padding: 18px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }

.bottom-nav { position: fixed; bottom: 24px; left: 16px; right: 16px; background: rgba(16, 19, 26, 0.9); backdrop-filter: blur(20px); border-radius: 24px; padding: 12px; display: flex; justify-content: space-around; border: 1px solid rgba(255, 255, 255, 0.05); z-index: 100; }
.nav-item { display: flex; flex-direction: column; align-items: center; color: rgba(225, 226, 235, 0.3); font-size: 10px; text-decoration: none; gap: 4px; flex: 1; }
.nav-item.active { color: var(--primary-container); }
.nav-icon { font-size: 20px; }
</style>
<script src="https://www.gstatic.com/firebasejs/9.17.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.2/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="header">
  <h2 class="header-title">가족 케어</h2>
  <p class="header-sub">가족이 함께 챙기는 따뜻한 마음 🛡️</p>
</div>

<div class="info-banner">
  <div class="info-text">
    약을 드시지 않았을 때 등록된 가족에게<br>
    <strong>카카오톡 알림</strong>을 보낼 수 있습니다. (최대 2명)
  </div>
</div>

<div class="section-title">
  <span>등록된 가족</span>
  <span class="guardian-count" id="guardian-count">0/2명</span>
</div>

<div class="guardian-list" id="guardian-list">
  <!-- Guardians will be injected here -->
</div>

<div class="add-section" id="add-section">
  <div class="add-card">
    <div class="input-group">
      <label class="input-label">가족 이름</label>
      <input type="text" class="input-field" id="g-name" placeholder="예: 홍길동">
    </div>
    <div class="input-group">
      <label class="input-label">전화번호</label>
      <input type="tel" class="input-field" id="g-phone" placeholder="010-0000-0000">
    </div>
    <div class="input-group">
      <label class="input-label">관계 선택</label>
      <div class="relation-grid">
        <button class="relation-btn" onclick="selectRel(this, '아내')">아내</button>
        <button class="relation-btn" onclick="selectRel(this, '남편')">남편</button>
        <button class="relation-btn" onclick="selectRel(this, '자녀')">자녀</button>
        <button class="relation-btn" onclick="selectRel(this, '부모님')">부모님</button>
        <button class="relation-btn" onclick="selectRel(this, '형제')">형제</button>
        <button class="relation-btn" onclick="selectRel(this, '친구')">친구</button>
        <button class="relation-btn" onclick="selectRel(this, '요양사')">요양사</button>
        <button class="relation-btn" onclick="selectRel(this, '기타')">기타</button>
      </div>
    </div>
    <button class="btn-add" id="btn-add">가족 추가하기</button>
  </div>
</div>

<div class="kakao-section">
  <button class="btn-kakao" id="btn-kakao">
    <span class="material-icons-round">chat_bubble</span>
    <span>카카오톡으로 가족에게 알리기</span>
  </button>
</div>

<div class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><span class="nav-icon material-icons-round">home</span><span>Home</span></a>
  <a href="stats.html" class="nav-item"><span class="nav-icon material-icons-round">bar_chart</span><span>통계</span></a>
  <a href="family.html" class="nav-item active"><span class="nav-icon material-icons-round">family_restroom</span><span>가족</span></a>
  <a href="community.html" class="nav-item"><span class="nav-icon material-icons-round">group</span><span>커뮤니티</span></a>
  <a href="settings.html" class="nav-item"><span class="nav-icon material-icons-round">settings</span><span>설정</span></a>
</div>

<script>
const config={apiKey:"AIzaSyDpnPJnErnrTloHk3HFrsXHORUMvAiOq5w",authDomain:"pill-sajangnim.firebaseapp.com",projectId:"pill-sajangnim",storageBucket:"pill-sajangnim.firebasestorage.app",messagingSenderId:"648268791992",appId:"1:648268791992:web:41a92580aa1a58ae6bb44d"};
firebase.initializeApp(config);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let selectedRel = '';
let guardians = [];

const emojis = {아내:'👩',남편:'👨',자녀:'👦',부모님:'👴',형제:'🧑',친구:'😊',요양사:'👩‍⚕️',기타:'👤'};

window.selectRel = function(btn, rel) {
    document.querySelectorAll('.relation-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedRel = rel;
};

auth.onAuthStateChanged(async user => {
    currentUser = user || JSON.parse(localStorage.getItem('yakmate_user'));
    if (currentUser) {
        const uid = currentUser.uid || 'kakao_'+currentUser.id;
        const snap = await db.collection('users').doc(uid).get();
        if (snap.exists && snap.data().guardians) {
            guardians = snap.data().guardians;
        }
        renderGuardians();
    }
});

function renderGuardians() {
    const list = document.getElementById('guardian-list');
    const count = document.getElementById('guardian-count');
    const addSection = document.getElementById('add-section');
    
    count.textContent = `${guardians.length}/2명`;
    
    if (guardians.length >= 2) addSection.style.display = 'none';
    else addSection.style.display = 'block';

    if (guardians.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:40px;opacity:0.3;font-size:14px">아직 등록된 가족이 없습니다.</div>';
        return;
    }

    list.innerHTML = guardians.map((g, i) => `
        <div class="guardian-card">
            <div class="guardian-avatar">${emojis[g.relation]||'👤'}</div>
            <div class="guardian-info">
                <div class="guardian-name">${g.name}</div>
                <div class="guardian-relation">${g.relation} · ${g.phone}</div>
            </div>
            <button class="btn-delete" onclick="deleteGuardian(${i})"><span class="material-icons-round">close</span></button>
        </div>
    `).join('');
}

window.deleteGuardian = async function(idx) {
    if (!confirm('정말 삭제할까요?')) return;
    guardians.splice(idx, 1);
    const uid = currentUser.uid || 'kakao_'+currentUser.id;
    await db.collection('users').doc(uid).set({ guardians }, { merge: true });
    renderGuardians();
};

document.getElementById('btn-add').addEventListener('click', async () => {
    const name = document.getElementById('g-name').value.trim();
    const phone = document.getElementById('g-phone').value.trim();
    if (!name || !phone || !selectedRel) { alert('정보를 모두 입력해주세요!'); return; }
    
    guardians.push({ name, phone, relation: selectedRel });
    const uid = currentUser.uid || 'kakao_'+currentUser.id;
    await db.collection('users').doc(uid).set({ guardians }, { merge: true });
    
    document.getElementById('g-name').value = '';
    document.getElementById('g-phone').value = '';
    selectedRel = '';
    renderGuardians();
});

document.getElementById('btn-kakao').addEventListener('click', () => {
    if (guardians.length === 0) { alert('먼저 가족을 등록해주세요!'); return; }
    const userName = currentUser ? (currentUser.displayName || currentUser.properties?.nickname || '사용자') : '사장님';
    const msg = `[약메이트 알림] 💊\n${userName}님이 아직 오늘 약을 드시지 않으셨어요.\n가족분께서 확인해주시면 감사하겠습니다! 😊`;
    const encoded = encodeURIComponent(msg);
    window.open(`https://sharer.kakao.com/talk/friends/picker/easylink?app_key=8088ae3fd80ed9cb91544a037bce4c63&validation_action=default&validation_params=%7B%22text%22%3A%22${encoded}%22%7D`,'_blank','width=400,height=600');
});
</script>
</body>
</html>
