<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YakMate | Health Promise</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <style>
        body {
            background: var(--bg-main);
            color: var(--on-bg);
            padding-bottom: 140px;
        }

        .header {
            padding: 32px 24px;
            background: transparent;
            z-index: 100;
        }

        .header-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--on-card);
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tab-group {
            display: flex;
            background: var(--bg-card);
            border-radius: 24px;
            padding: 8px;
            margin-bottom: 32px;
            position: relative;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .tab {
            flex: 1;
            padding: 16px 0;
            text-align: center;
            font-size: 15px;
            font-weight: 800;
            border-radius: 18px;
            cursor: pointer;
            position: relative;
            z-index: 2;
            transition: color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-dim);
        }

        .tab.active {
            color: #fff;
        }

        .tab-pill {
            position: absolute;
            top: 8px;
            left: 8px;
            height: calc(100% - 16px);
            width: calc(33.333% - 10.66px);
            background: var(--primary);
            border-radius: 16px;
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 8px 20px var(--primary-glow);
        }

        .summary-card {
            background: var(--bg-card);
            border-radius: 40px;
            padding: 36px;
            margin-bottom: 32px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .summary-title {
            font-size: 14px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .summary-num {
            font-size: 44px;
            font-weight: 900;
            font-family: 'Space Grotesk', sans-serif;
            color: var(--on-card);
            letter-spacing: -2px;
        }

        .summary-desc {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dim);
            margin-top: 8px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 32px;
            margin-bottom: 32px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .stat-label {
            font-size: 18px;
            font-weight: 800;
            color: var(--on-card);
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bar-item { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .bar-label { font-size: 14px; font-weight: 800; color: var(--text-dim); width: 44px; }
        .bar-bg { flex: 1; background: var(--bg-float); border-radius: 50px; height: 16px; overflow: hidden; border: 1px solid var(--border); }
        .bar-fill { border-radius: 50px; height: 14px; transition: width 1s cubic-bezier(0.22, 1, 0.36, 1); margin: 1px; }
        .bar-fill.low { background: #ff6e84; }
        .bar-fill.mid { background: var(--secondary); }
        .bar-fill.high { background: var(--primary); }
        .bar-pct { font-size: 15px; font-weight: 800; color: var(--on-card); font-family: 'Space Grotesk', sans-serif; width: 44px; text-align: right; }

.loading { text-align: center; padding: 60px; color: rgba(255, 255, 255, 0.2); font-size: 14px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 16px; }
.loading span { animation: pulse 1.5s infinite; }

@keyframes pulse { 0% { opacity: 0.2; } 50% { opacity: 0.6; } 100% { opacity: 0.2; } }

.nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(225, 226, 235, 0.3); font-size: 11px; text-decoration: none; gap: 4px; transition: all 0.3s; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; text-align: center; }
.nav-item.active { color: var(--primary-container); }
.nav-icon { font-size: 22px; }
</style>

    <style>
    .nav-bar {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(29,32,38,0.9);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 32px;
        padding: 12px 8px;
        display: flex;
        z-index: 1000;
        box-shadow: 0 16px 48px rgba(0,0,0,0.4);
        width: calc(100% - 48px);
        max-width: 480px;
        justify-content: space-around;
    }
    body.light-mode .nav-bar {
        background: rgba(255,255,255,0.92);
        border: 1px solid rgba(0,0,0,0.08);
        box-shadow: 0 16px 48px rgba(0,0,0,0.1);
    }
    .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        color: rgba(225,226,235,0.4);
        text-decoration: none;
        padding: 8px 12px;
        border-radius: 20px;
        transition: all 0.3s;
        flex: 1;
    }
    body.light-mode .nav-item {
        color: rgba(26,29,35,0.4);
    }
    .nav-item.active {
        color: #D4AF37;
        background: rgba(212,175,55,0.1);
    }
    .nav-icon { font-size: 22px; }
    .nav-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }
    </style>

<style>/* NAV OVERRIDE */
.nav-bar {
    position: fixed !important;
    bottom: 24px !important;
    left: 50% !important;
    transform: translateX(-50%) !important;
    background: rgba(29,32,38,0.92) !important;
    backdrop-filter: blur(20px) !important;
    border: 1px solid rgba(255,255,255,0.08) !important;
    border-radius: 32px !important;
    padding: 10px 8px !important;
    display: flex !important;
    flex-direction: row !important;
    z-index: 9999 !important;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4) !important;
    width: calc(100% - 48px) !important;
    max-width: 480px !important;
    justify-content: space-around !important;
    grid-template-columns: unset !important;
}
body.light-mode .nav-bar {
    background: rgba(255,255,255,0.95) !important;
    border: 1px solid rgba(0,0,0,0.08) !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12) !important;
}
</style>
</head>
<body>
<script>
  (function() {
    const theme = localStorage.getItem('yakmate_theme');
    if (theme === 'light') document.body.classList.add('light-mode');
  })();
</script>
<div class="header">
    <div class="header-title">
        <span class="material-icons-round" style="color:var(--primary); font-size: 32px;">analytics</span>
        <span>Health Promise</span>
    </div>
</div>

<div class="content">
  <div class="tab-group">
    <div class="tab-pill"></div>
    <div class="tab active" onclick="showTab('week')">한 주 약속</div>
    <div class="tab" onclick="showTab('month')">한 달 약속</div>
    <div class="tab" onclick="showTab('year')">일 년 약속</div>
  </div>
  
  <div id="tab-week"><div class="loading"><span class="material-icons-round" style="font-size:32px">hourglass_empty</span><span>데이터를 분석 중입니다...</span></div></div>
  
  <div id="tab-month" style="display:none; position:relative">
    <div class="loading"><span class="material-icons-round" style="font-size:32px">hourglass_empty</span><span>데이터를 분석 중입니다...</span></div>
  </div>

  <div id="tab-year" style="display:none; position:relative">
    <div class="loading"><span class="material-icons-round" style="font-size:32px">hourglass_empty</span><span>데이터를 분석 중입니다...</span></div>
  </div>
</div>

<nav class="nav-bar">
    <a href="dashboard.html" class="nav-item">
        <span class="material-icons-round">home</span>
        <span>Home</span>
    </a>
    <a href="stats.html" class="nav-item active">
        <span class="material-icons-round">analytics</span>
        <span>Health Promise</span>
    </a>
    <a href="community.html" class="nav-item">
        <span class="material-icons-round">forum</span>
        <span>Story Nudge</span>
    </a>
    <a href="settings.html" class="nav-item">
        <span class="material-icons-round">person</span>
        <span>My Center</span>
    </a>
</nav>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-auth.js";
import{getFirestore,collection,getDocs}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-firestore.js";

const config={apiKey:"AIzaSyDpnPJnErnrTloHk3HFrsXHORUMvAiOq5w",authDomain:"pill-sajangnim.firebaseapp.com",projectId:"pill-sajangnim",storageBucket:"pill-sajangnim.firebasestorage.app",messagingSenderId:"648268791992",appId:"1:648268791992:web:41a92580aa1a58ae6bb44d"};
const app=initializeApp(config);
const auth=getAuth(app);
const db=getFirestore(app);

const DAYS=['일','월','화','수','목','금','토'];
const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function pctColor(p){return p>=80?'high':p>=50?'mid':'low'}

function makeBar(label,pct){
  return `<div class="bar-item">
    <div class="bar-label">${label}</div>
    <div class="bar-bg"><div class="bar-fill ${pctColor(pct)}" style="width:${pct}%"></div></div>
    <div class="bar-pct">${pct}%</div>
  </div>`;
}

function makeSummary(title,pct,days,unit){
  return `<div class="summary-card">
    <div class="summary-title">${title}</div>
    <div class="summary-grid">
      <div><div class="summary-num">${pct}%</div><div class="summary-desc">약 잘 챙겨드신 정도</div></div>
      <div><div class="summary-num">${days}${unit}</div><div class="summary-desc">약 잘 챙겨드신 기간</div></div>
    </div>
  </div>`;
}

onAuthStateChanged(auth,async(u)=>{
  let user = u;
  if(!user){
    const storedUser = localStorage.getItem('yakmate_user');
    if(storedUser) user = JSON.parse(storedUser);
  }
  if(!user){window.location.href='./index.html';return;}
  
  let docs = [];
  const getKstDate = (d = new Date()) => {
    const offset = 9 * 60 * 60 * 1000;
    const kst = new Date(d.getTime() + offset);
    return kst.toISOString().split('T')[0];
  };
  const today = new Date();
  const todayKey = getKstDate(today);

  if (user.isGuest) {
    // For guest mode, we look for guest data in localStorage
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith('yakmate_guest_data_')) {
            const dateKey = key.replace('yakmate_guest_data_', '');
            docs.push({ id: dateKey, meds: JSON.parse(localStorage.getItem(key)) });
        }
    }
  } else {
    const snap=await getDocs(collection(db,'users',user.uid,'daily'));
    snap.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
  }

  const data={};
  let globalFirstDateKey = null;
  const nowTime = today.getHours() * 60 + today.getMinutes();

  docs.forEach(doc => {
    const meds=doc.meds||[];
    const total=meds.length;
    if(total === 0) return; 
    
    let missed = 0;
    meds.forEach(m => {
        if(!m.taken) {
            if(doc.id < todayKey) missed++;
            else if(doc.id === todayKey) {
                const [h, min] = m.time.split(':').map(Number);
                const mTime = h * 60 + min;
                if(nowTime > mTime) missed++;
            }
        }
    });

    data[doc.id] = Math.round((total - missed) / total * 100);
    if(!globalFirstDateKey || doc.id < globalFirstDateKey) globalFirstDateKey = doc.id;
  });

  if(!globalFirstDateKey) globalFirstDateKey = todayKey;

  const getAdherenceForDate = (key) => {
    if (key < globalFirstDateKey) return null;
    if (data[key] !== undefined) return data[key];
    if (key > todayKey) return null;
    return null; 
  };

  // Week View
  const weekStart=new Date(today);
  weekStart.setDate(today.getDate()-today.getDay());
  let weekBars='',weekDays=0,weekSum=0,weekValidCount=0;
  for(let i=0;i<7;i++){
    const d=new Date(weekStart);
    d.setDate(weekStart.getDate()+i);
    const key=getKstDate(d);
    const pct = getAdherenceForDate(key);
    
    if(pct !== null) {
        weekBars+=makeBar(DAYS[d.getDay()], pct);
        weekSum+=pct;
        weekValidCount++;
        if(pct > 0 && key <= todayKey) weekDays++;
    } else {
        weekBars+=`<div class="bar-item" style="opacity:0.2">
            <div class="bar-label">${DAYS[d.getDay()]}</div>
            <div class="bar-bg"></div>
            <div class="bar-pct">-</div>
        </div>`;
    }
  }
  const weekAvg = weekValidCount > 0 ? Math.round(weekSum/weekValidCount) : 100;
  document.getElementById('tab-week').innerHTML=
    makeSummary('이번 주 Health Promise',weekAvg,weekDays,'일')+
    `<div class="stat-card"><div class="stat-label">요일별 달성 현황</div>${weekBars}</div>`;

  // Month View
  const daysInMonth=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  let monthBars='',monthDays=0,monthSum=0,monthValidCount=0;
  for(let w=1;w<=5;w++){
    const s=(w-1)*7+1,e=Math.min(w*7,daysInMonth);
    if(s>daysInMonth)break;
    let wSum=0,wCount=0;
    for(let day=s;day<=e;day++){
      const date=new Date(today.getFullYear(),today.getMonth(),day);
      const key=getKstDate(date);
      const pct = getAdherenceForDate(key);
      if(pct !== null) {
          wSum+=pct;
          wCount++;
      }
    }
    const pct=wCount>0?Math.round(wSum/wCount):null;
    if(pct !== null) {
        monthBars+=makeBar(w+'주차',pct);
        monthSum += pct;
        monthValidCount++;
        if(pct > 0) monthDays++;
    } else {
        monthBars+=`<div class="bar-item" style="opacity:0.2">
            <div class="bar-label">${w}주차</div>
            <div class="bar-bg"></div>
            <div class="bar-pct">-</div>
        </div>`;
    }
  }
  const monthAvg = monthValidCount > 0 ? Math.round(monthSum/monthValidCount) : 100;
  document.getElementById('tab-month').innerHTML=
    makeSummary('이번 달 Health Promise',monthAvg,monthDays,'주')+
    `<div class="stat-card"><div class="stat-label">주차별 달성 현황</div>${monthBars}</div>`;

  // Year View
  let yearBars='',yearDays=0,yearSum=0,yearValidCount=0;
  for(let m=0;m<=today.getMonth();m++){
    const daysInM=new Date(today.getFullYear(),m+1,0).getDate();
    let mSum=0,mCount=0;
    for(let day=1;day<=daysInM;day++){
      const date=new Date(today.getFullYear(),m,day);
      const key=getKstDate(date);
      const pct = getAdherenceForDate(key);
      if(pct !== null) {
          mSum+=pct;
          mCount++;
      }
    }
    const pct=mCount>0?Math.round(mSum/mCount):null;
    if(pct !== null) {
        yearBars+=makeBar(MONTHS[m],pct);
        yearSum += pct;
        yearValidCount++;
        if(pct > 0) yearDays++;
    } else {
        yearBars+=`<div class="bar-item" style="opacity:0.2">
            <div class="bar-label">${MONTHS[m]}</div>
            <div class="bar-bg"></div>
            <div class="bar-pct">-</div>
        </div>`;
    }
  }
  const yearAvg = yearValidCount > 0 ? Math.round(yearSum/yearValidCount) : 100;
  document.getElementById('tab-year').innerHTML=
    makeSummary('올해 Health Promise',yearAvg,yearDays,'개월')+
    `<div class="stat-card"><div class="stat-label">월별 달성 현황</div>${yearBars}</div>`;
});

window.showTab=function(tab){
  const tabs = ['week','month','year'];
  const pill = document.querySelector('.tab-pill');
  tabs.forEach((t,i)=>{
    document.getElementById('tab-'+t).style.display=t===tab?'block':'none';
    const tabEl = document.querySelectorAll('.tab')[i];
    tabEl.classList.toggle('active',t===tab);
    if(t===tab) {
        pill.style.transform = `translateX(${i * 100}%)`;
    }
  });
};
</script>
</body>
</html>
