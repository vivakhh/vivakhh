<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YakMate | 건강 기록</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root {
    --primary-container: #00e5ff;
    --background: #0b0e14;
    --surface-container: #1d2026;
    --surface-high: #272a31;
    --on-surface: #e1e2eb;
    --glass: rgba(29, 32, 38, 0.7);
    --gold: #D4AF37;
}

body.light-mode {
    --background: #fdfdfd;
    --on-surface: #1a1d23;
    --surface-container: #ffffff;
    --surface-high: #f0f2f5;
    --glass: rgba(255, 255, 255, 0.9);
    --gold: #8d6e63;
    --primary-container: #7c4dff;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
body { 
    font-family: 'Manrope', 'Noto Sans KR', sans-serif; 
    background: var(--background); 
    color: var(--on-surface);
    min-height: 100vh;
    padding-bottom: 120px;
}

.header { padding: 32px 24px; position: sticky; top: 0; background: rgba(11, 14, 20, 0.8); backdrop-filter: blur(20px); z-index: 100; }
.header-title { font-size: 24px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 12px; }

.content { padding: 0 24px; }

.tab-group { 
    display: flex; 
    background: var(--surface-container); 
    border-radius: 20px; 
    padding: 6px; 
    margin-bottom: 32px; 
    position: relative;
    border: 1px solid rgba(255, 255, 255, 0.05); 
}
.tab { 
    flex: 1; 
    padding: 14px 0; 
    text-align: center; 
    font-size: 15px; 
    font-weight: 700; 
    border-radius: 16px; 
    cursor: pointer; 
    position: relative;
    z-index: 2;
    transition: color 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
    color: rgba(255, 255, 255, 0.3); 
}
.tab.active { color: #fff; }
body.light-mode .tab { color: rgba(0, 0, 0, 0.3); }
body.light-mode .tab.active { color: #000; }
.tab-pill {
    position: absolute;
    top: 6px;
    left: 6px;
    height: calc(100% - 12px);
    width: calc(33.333% - 8px);
    background: var(--primary-container);
    border-radius: 14px;
    z-index: 1;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 8px 20px rgba(0, 229, 255, 0.2);
}
body.light-mode .tab.active { color: #fff; }
body.light-mode .tab-pill { background: var(--primary-container); }
body.light-mode .summary-card { background: linear-gradient(135deg, rgba(124,77,255,0.08) 0%, rgba(124,77,255,0.04) 100%); border-color: rgba(124,77,255,0.15); }
body.light-mode .summary-title { color: #1a1d23; opacity: 0.6; }
body.light-mode .stat-card { background: #fff; border: 1px solid rgba(0,0,0,0.06); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
body.light-mode .stat-label { color: #1a1d23; }
body.light-mode .bar-label { color: rgba(0,0,0,0.4); }
body.light-mode .bar-pct { color: #1a1d23; }
body.light-mode .bar-bg { background: rgba(0,0,0,0.05); }
body.light-mode .bottom-nav { background: rgba(255,255,255,0.9); border: 1px solid rgba(0,0,0,0.05); }
body.light-mode .nav-item { color: rgba(0,0,0,0.3); }
body.light-mode .nav-item.active { color: #7c4dff; }
body.light-mode .header { background: rgba(253,253,253,0.8); }
body.light-mode .header-title { color: #1a1d23; }
body.light-mode .summary-card { background: linear-gradient(135deg, rgba(124,77,255,0.08) 0%, rgba(124,77,255,0.04) 100%); border-color: rgba(124,77,255,0.15); }
body.light-mode .summary-title { color: #1a1d23; opacity: 0.6; }
body.light-mode .stat-card { background: #fff; border: 1px solid rgba(0,0,0,0.06); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
body.light-mode .stat-label { color: #1a1d23; }
body.light-mode .bar-label { color: rgba(0,0,0,0.4); }
body.light-mode .bar-pct { color: #1a1d23; }
body.light-mode .bar-bg { background: rgba(0,0,0,0.05); }
body.light-mode .bottom-nav { background: rgba(255,255,255,0.9); border: 1px solid rgba(0,0,0,0.05); }
body.light-mode .nav-item { color: rgba(0,0,0,0.3); }
body.light-mode .nav-item.active { color: #7c4dff; }
body.light-mode .header { background: rgba(253,253,253,0.8); }
body.light-mode .header-title { color: #1a1d23; }

.summary-card { 
    background: linear-gradient(135deg, rgba(0, 229, 255, 0.1) 0%, rgba(124, 77, 255, 0.1) 100%); 
    border-radius: 32px; 
    padding: 32px; 
    color: var(--on-surface); 
    margin-bottom: 24px;
    border: 1px solid rgba(0, 229, 255, 0.1);
    position: relative;
    overflow: hidden;
}
.summary-title { font-size: 14px; font-weight: 600; opacity: 0.6; margin-bottom: 24px; letter-spacing: 0.5px; }
.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; position: relative; z-index: 1; }
.summary-num { font-size: 32px; font-weight: 800; font-family: 'Space Grotesk', sans-serif; color: var(--primary-container); }
.summary-desc { font-size: 12px; opacity: 0.5; margin-top: 6px; font-weight: 600; }
.summary-grid > div { text-align: center; }

.stat-card { 
    background: var(--surface-container); 
    border-radius: 32px; 
    padding: 32px; 
    margin-bottom: 24px; 
    border: 1px solid rgba(255, 255, 255, 0.03); 
}
.stat-label { font-size: 15px; color: var(--on-surface); margin-bottom: 24px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.stat-label::before { content: ''; display: block; width: 4px; height: 16px; background: var(--primary-container); border-radius: 2px; }

.bar-item { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
.bar-label { font-size: 13px; font-weight: 700; color: rgba(255, 255, 255, 0.4); width: 40px; text-align: right; flex-shrink: 0; }
.bar-bg { flex: 1; background: rgba(255, 255, 255, 0.03); border-radius: 50px; height: 12px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.02); }
.bar-fill { border-radius: 50px; height: 10px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); margin: 1px; }
.bar-fill.low { background: #ff6e84; box-shadow: 0 0 10px rgba(255, 110, 132, 0.4); }
.bar-fill.mid { background: #ffd54f; box-shadow: 0 0 10px rgba(255, 213, 79, 0.4); }
.bar-fill.high { background: var(--primary-container); box-shadow: 0 0 10px rgba(0, 229, 255, 0.4); }
.bar-pct { font-size: 14px; font-weight: 700; width: 40px; color: var(--on-surface); font-family: 'Space Grotesk', sans-serif; text-align: right; }

.loading { text-align: center; padding: 60px; color: rgba(255, 255, 255, 0.2); font-size: 14px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 16px; }
.loading span { animation: pulse 1.5s infinite; }

@keyframes pulse { 0% { opacity: 0.2; } 50% { opacity: 0.6; } 100% { opacity: 0.2; } }

.bottom-nav { position: fixed; bottom: 24px; left: 24px; right: 24px; background: rgba(16, 19, 26, 0.9); backdrop-filter: blur(20px); border-radius: 24px; padding: 12px; display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid rgba(255, 255, 255, 0.05); z-index: 100; }
.nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(225, 226, 235, 0.3); font-size: 11px; text-decoration: none; gap: 4px; transition: all 0.3s; }
.nav-item.active { color: var(--primary-container); }
.nav-icon { font-size: 22px; }
</style>
</head>
<body>
<script>
  (function() {
    const theme = localStorage.getItem('yakmate_theme');
    if (theme === 'light') document.body.classList.add('light-mode');
  })();
</script>
<div class="header">
    <div class="header-title">
        <span class="material-icons-round" style="color:var(--primary-container)">analytics</span>
        <span>건강 기록장</span>
    </div>
</div>

<div class="content">
  <div class="tab-group">
    <div class="tab-pill"></div>
    <div class="tab active" onclick="showTab('week')">한 주 이야기</div>
    <div class="tab" onclick="showTab('month')">한 달 이야기</div>
    <div class="tab" onclick="showTab('year')">일 년 이야기</div>
  </div>
  
  <div id="tab-week"><div class="loading"><span class="material-icons-round" style="font-size:32px">hourglass_empty</span><span>데이터를 분석 중입니다...</span></div></div>
  
  <div id="tab-month" style="display:none; position:relative">
    <div class="loading"><span class="material-icons-round" style="font-size:32px">hourglass_empty</span><span>데이터를 분석 중입니다...</span></div>
  </div>

  <div id="tab-year" style="display:none; position:relative">
    <div class="loading"><span class="material-icons-round" style="font-size:32px">hourglass_empty</span><span>데이터를 분석 중입니다...</span></div>
  </div>

  <!-- 추가 분석 섹션 -->

</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="location.href='dashboard.html'"><span class="nav-icon material-icons-round">home</span><span>홈</span></div>
  <div class="nav-item active"><span class="nav-icon material-icons-round">bar_chart</span><span>건강 기록</span></div>
  <div class="nav-item" onclick="location.href='community.html'"><span class="nav-icon material-icons-round">group</span><span>우리 이야기</span></div>
  <div class="nav-item" onclick="location.href='settings.html'"><span class="nav-icon material-icons-round">settings</span><span>설정</span></div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-auth.js";
import{getFirestore,collection,getDocs}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-firestore.js";

const config={apiKey:"AIzaSyDpnPJnErnrTloHk3HFrsXHORUMvAiOq5w",authDomain:"pill-sajangnim.firebaseapp.com",projectId:"pill-sajangnim",storageBucket:"pill-sajangnim.firebasestorage.app",messagingSenderId:"648268791992",appId:"1:648268791992:web:41a92580aa1a58ae6bb44d"};
const app=initializeApp(config);
const auth=getAuth(app);
const db=getFirestore(app);

const DAYS=['일','월','화','수','목','금','토'];
const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function pctColor(p){return p>=80?'high':p>=50?'mid':'low'}

function makeBar(label,pct){
  return `<div class="bar-item">
    <div class="bar-label">${label}</div>
    <div class="bar-bg"><div class="bar-fill ${pctColor(pct)}" style="width:${pct}%"></div></div>
    <div class="bar-pct">${pct}%</div>
  </div>`;
}

function makeSummary(title,pct,days,unit){
  return `<div class="summary-card">
    <div class="summary-title">${title}</div>
    <div class="summary-grid">
      <div><div class="summary-num">${pct}%</div><div class="summary-desc">약 잘 챙겨드신 정도</div></div>
      <div><div class="summary-num">${days}${unit}</div><div class="summary-desc">약 잘 챙겨드신 기간</div></div>
    </div>
  </div>`;
}

onAuthStateChanged(auth,async(u)=>{
  let user = u;
  if(!user){
    const kakaoData = localStorage.getItem('yakmate_kakao_user');
    if(kakaoData) user = JSON.parse(kakaoData);
  }
  if(!user){window.location.href='./index.html';return;}
  
  const snap=await getDocs(collection(db,'users',user.uid,'daily'));
  const data={};
  let globalFirstDateKey = null;
  
  const getKstDate = (d = new Date()) => {
    const offset = 9 * 60 * 60 * 1000;
    const kst = new Date(d.getTime() + offset);
    return kst.toISOString().split('T')[0];
  };
  const today = new Date();
  const todayKey = getKstDate(today);
  const nowTime = today.getHours() * 60 + today.getMinutes();

  snap.forEach(doc=>{
    const d=doc.data();
    const meds=d.meds||[];
    const total=meds.length;
    if(total === 0) return; 
    
    let missed = 0;
    meds.forEach(m => {
        if(!m.taken) {
            if(doc.id < todayKey) missed++;
            else if(doc.id === todayKey) {
                const [h, min] = m.time.split(':').map(Number);
                const mTime = h * 60 + min;
                if(nowTime > mTime) missed++;
            }
        }
    });

    data[doc.id] = Math.round((total - missed) / total * 100);
    if(!globalFirstDateKey || doc.id < globalFirstDateKey) globalFirstDateKey = doc.id;
  });

  if(!globalFirstDateKey) globalFirstDateKey = todayKey;

  // 유효한 점수를 가져오는 함수 (사장님 요청사항 반영)
  const getAdherenceForDate = (key) => {
    if (key < globalFirstDateKey) return null; // 시작 전은 제외
    if (data[key] !== undefined) return data[key];
    if (key > todayKey) return null; // 미래는 제외 (통계에 포함 안 함)
    // 과거인데 기록 없는 날은 null (약속 없는 날로 간주)
    return null; 
  };

  // 이번 주
  const weekStart=new Date(today);
  weekStart.setDate(today.getDate()-today.getDay());
  let weekBars='',weekDays=0,weekSum=0,weekValidCount=0;
  for(let i=0;i<7;i++){
    const d=new Date(weekStart);
    d.setDate(weekStart.getDate()+i);
    const key=getKstDate(d);
    const pct = getAdherenceForDate(key);
    
    if(pct !== null) {
        weekBars+=makeBar(DAYS[d.getDay()], pct);
        weekSum+=pct;
        weekValidCount++;
        if(pct > 0 && key <= todayKey) weekDays++;
    } else {
        weekBars+=`<div class="bar-item" style="opacity:0.2">
            <div class="bar-label">${DAYS[d.getDay()]}</div>
            <div class="bar-bg"></div>
            <div class="bar-pct">-</div>
        </div>`;
    }
  }
  const weekAvg = weekValidCount > 0 ? Math.round(weekSum/weekValidCount) : 100;
  document.getElementById('tab-week').innerHTML=
    makeSummary('이번 주 건강 챙기기',weekAvg,weekDays,'일')+
    `<div class="stat-card"><div class="stat-label">요일별 건강 기록</div>${weekBars}</div>`;

  // 이번 달
  const daysInMonth=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  let monthBars='',monthDays=0,monthSum=0,monthValidCount=0;
  for(let w=1;w<=5;w++){
    const s=(w-1)*7+1,e=Math.min(w*7,daysInMonth);
    if(s>daysInMonth)break;
    let wSum=0,wCount=0;
    for(let day=s;day<=e;day++){
      const date=new Date(today.getFullYear(),today.getMonth(),day);
      const key=getKstDate(date);
      const pct = getAdherenceForDate(key);
      if(pct !== null) {
          wSum+=pct;
          wCount++;
      }
    }
    const pct=wCount>0?Math.round(wSum/wCount):null;
    
    if(pct !== null) {
        monthBars+=makeBar(w+'주차',pct);
        monthSum += pct;
        monthValidCount++;
        if(pct > 0) monthDays++;
    } else {
        monthBars+=`<div class="bar-item" style="opacity:0.2">
            <div class="bar-label">${w}주차</div>
            <div class="bar-bg"></div>
            <div class="bar-pct">-</div>
        </div>`;
    }
  }
  const monthAvg = monthValidCount > 0 ? Math.round(monthSum/monthValidCount) : 100;
  const monthWeeks = Math.round(monthDays); // 이미 주차별로 카운트됨
  document.getElementById('tab-month').innerHTML=
    makeSummary('이번 달 건강 챙기기',monthAvg,monthWeeks,'주')+
    `<div class="stat-card"><div class="stat-label">주차별 건강 기록</div>${monthBars}</div>`;

  // 올해
  let yearBars='',yearDays=0,yearSum=0,yearValidCount=0;
  for(let m=0;m<=today.getMonth();m++){
    const daysInM=new Date(today.getFullYear(),m+1,0).getDate();
    let mSum=0,mCount=0;
    for(let day=1;day<=daysInM;day++){
      const date=new Date(today.getFullYear(),m,day);
      const key=getKstDate(date);
      const pct = getAdherenceForDate(key);
      if(pct !== null) {
          mSum+=pct;
          mCount++;
      }
    }
    const pct=mCount>0?Math.round(mSum/mCount):null;
    
    if(pct !== null) {
        yearBars+=makeBar(MONTHS[m],pct);
        yearSum += pct;
        yearValidCount++;
        if(pct > 0) yearDays++;
    } else {
        yearBars+=`<div class="bar-item" style="opacity:0.2">
            <div class="bar-label">${MONTHS[m]}</div>
            <div class="bar-bg"></div>
            <div class="bar-pct">-</div>
        </div>`;
    }
  }
  const yearAvg = yearValidCount > 0 ? Math.round(yearSum/yearValidCount) : 100;
  document.getElementById('tab-year').innerHTML=
    makeSummary('올해 건강 챙기기',yearAvg,yearDays,'개월')+
    `<div class="stat-card"><div class="stat-label">월별 건강 기록</div>${yearBars}</div>`;
});

window.showTab=function(tab){
  const tabs = ['week','month','year'];
  const pill = document.querySelector('.tab-pill');
  tabs.forEach((t,i)=>{
    document.getElementById('tab-'+t).style.display=t===tab?'block':'none';
    const tabEl = document.querySelectorAll('.tab')[i];
    tabEl.classList.toggle('active',t===tab);
    if(t===tab) {
        pill.style.transform = `translateX(${i * 100}%)`;
    }
  });
};
</script>
</body>
</html>
