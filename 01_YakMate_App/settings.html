<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YakMate | 설정</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root {
    --primary-container: #00e5ff;
    --background: #0b0e14;
    --surface-container: #1d2026;
    --surface-high: #272a31;
    --on-surface: #e1e2eb;
    --primary-container: #00e5ff;
    --background: #0b0e14;
    --surface-container: #1d2026;
    --surface-high: #272a31;
    --on-surface: #e1e2eb;
    --glass: rgba(29, 32, 38, 0.7);
    --gold: #D4AF37;
}

body.light-mode {
    --background: #fdfdfd;
    --on-surface: #1a1d23;
    --surface-container: #ffffff;
    --surface-high: #f0f2f5;
    --glass: rgba(255, 255, 255, 0.9);
    --gold: #8d6e63;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
body { 
    font-family: 'Manrope', 'Noto Sans KR', sans-serif; 
    background: var(--background); 
    color: var(--on-surface);
    min-height: 100vh;
    padding-bottom: 120px;
}

.header { padding: 32px 24px; position: sticky; top: 0; background: rgba(11, 14, 20, 0.8); backdrop-filter: blur(20px); z-index: 100; }
.header-title { font-size: 24px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 12px; }

.content { padding: 0 24px; }

.section-card { 
    background: var(--glass); 
    border-radius: 32px; 
    padding: 24px; 
    margin-bottom: 20px; 
    border: 1px solid rgba(255, 255, 255, 0.03); 
}
.section-title { font-size: 14px; font-weight: 700; color: var(--gold); margin-bottom: 20px; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }

.profile-row { display: flex; align-items: center; gap: 20px; padding: 8px 0; }
.avatar { width: 64px; height: 64px; border-radius: 20px; background: linear-gradient(135deg, var(--primary-container) 0%, #7c4dff 100%); display: flex; align-items: center; justify-content: center; font-size: 24px; color: #000; font-weight: 800; box-shadow: 0 8px 20px rgba(0, 229, 255, 0.2); }
.profile-name { font-size: 18px; font-weight: 700; color: #fff; }
.profile-email { font-size: 13px; color: rgba(255, 255, 255, 0.3); margin-top: 4px; }

.setting-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; }
.setting-label { font-size: 15px; font-weight: 600; color: #fff; }
.setting-sub { font-size: 12px; color: rgba(255, 255, 255, 0.3); margin-top: 4px; }

.toggle { position: relative; width: 48px; height: 26px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255, 255, 255, 0.05); border-radius: 50px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.05); }
.toggle-slider:before { content: ''; position: absolute; width: 20px; height: 20px; left: 2px; bottom: 2px; background: #fff; border-radius: 50%; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
input:checked + .toggle-slider { background: var(--primary-container); }
input:checked + .toggle-slider:before { transform: translateX(22px); background: #000; }

.menu-item { 
    width: 100%; 
    background: rgba(255, 255, 255, 0.02); 
    border: 1px solid rgba(255, 255, 255, 0.05); 
    border-radius: 20px; 
    padding: 20px; 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    cursor: pointer; 
    transition: all 0.3s; 
    margin-top: 8px;
}
.menu-item:hover { background: rgba(255, 255, 255, 0.05); }
.menu-left { display: flex; align-items: center; gap: 14px; }
.menu-icon { font-size: 20px; color: var(--primary-container); }
.menu-label { font-size: 15px; font-weight: 600; color: #fff; }

.logout-btn { 
    width: 100%; 
    padding: 18px; 
    background: rgba(255, 110, 132, 0.05); 
    color: #ff6e84; 
    border: 1px solid rgba(255, 110, 132, 0.1); 
    border-radius: 20px; 
    font-size: 15px; 
    font-weight: 700; 
    cursor: pointer; 
    margin-top: 12px; 
    transition: all 0.3s;
}
.logout-btn:hover { background: rgba(255, 110, 132, 0.1); }

.bottom-nav { position: fixed; bottom: 24px; left: 24px; right: 24px; background: rgba(16, 19, 26, 0.9); backdrop-filter: blur(20px); border-radius: 24px; padding: 12px; display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid rgba(255, 255, 255, 0.05); z-index: 100; }
.nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(225, 226, 235, 0.3); font-size: 11px; text-decoration: none; gap: 4px; transition: all 0.3s; }
.nav-item.active { color: var(--primary-container); }
.nav-icon { font-size: 22px; }

/* Light Mode Overrides */
body.light-mode {
    --primary-container: #7c4dff; /* Soft purple for light mode */
}
body.light-mode .header { background: rgba(253, 253, 253, 0.8); }
body.light-mode .header-title { color: #1a1d23; }
body.light-mode .setting-label { color: #1a1d23; }
body.light-mode .profile-name { color: #1a1d23; }
body.light-mode .section-card { background: #fff; border: 1px solid rgba(0, 0, 0, 0.05); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
body.light-mode .bottom-nav { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0, 0, 0, 0.05); }
body.light-mode .nav-item { color: rgba(0, 0, 0, 0.3); }
body.light-mode .nav-item.active { color: #7c4dff; }
body.light-mode .menu-label { color: #1a1d23; }
body.light-mode .menu-item { border-bottom-color: rgba(0,0,0,0.05); }
body.light-mode .section-title { color: rgba(0,0,0,0.8); }
body.light-mode .setting-sub { color: rgba(0,0,0,0.5); }
body.light-mode .profile-email { color: rgba(0,0,0,0.4); }
body.light-mode .profile-name { color: #1a1d23; }
body.light-mode .toggle-slider { background: rgba(0,0,0,0.1); }
body.light-mode .logout-btn { color: #e53935; border-color: rgba(229,57,53,0.2); }
body.light-mode .section-card { background: #ffffff; }
body.light-mode { background: #f5f5f5; color: #1a1d23; }
body.light-mode .profile-email { color: rgba(0,0,0,0.4); }
body.light-mode .profile-name { color: #1a1d23; }
body.light-mode .toggle-slider { background: rgba(0,0,0,0.1); }
body.light-mode .logout-btn { color: #e53935; border-color: rgba(229,57,53,0.2); }
body.light-mode .section-card { background: #ffffff; }
body.light-mode { background: #f5f5f5; color: #1a1d23; }

.theme-selector { display: flex; gap: 12px; margin-top: 16px; }
.theme-btn { 
    flex: 1; 
    padding: 16px; 
    border-radius: 24px; 
    border: 2px solid transparent; 
    cursor: pointer; 
    text-align: center; 
    transition: all 0.3s;
    font-size: 14px;
    font-weight: 700;
}
.theme-btn.dark { background: #1d2026; color: #fff; border-color: rgba(255,255,255,0.1); }
.theme-btn.light { background: #f0f2f5; color: #1a1d23; border-color: rgba(0,0,0,0.05); }
.theme-btn.active { border-color: var(--primary-container); transform: scale(1.05); box-shadow: 0 8px 20px rgba(0, 229, 255, 0.1); }
</style>
</head>
<body>
<div class="header">
    <div class="header-title">
        <span class="material-icons-round" style="color:var(--primary-container)">settings</span>
        <span>설정</span>
    </div>
</div>

<div class="content">


    <div class="section-card">
        <div class="section-title">나의 프로필</div>
        <div class="profile-row">
            <div class="avatar" id="avatar-initial">?</div>
            <div class="profile-info">
                <div class="profile-name" id="profile-name">불러오는 중...</div>
                <div class="profile-email" id="profile-email"></div>
            </div>
        </div>
    </div>

    <div class="section-card">
        <div class="section-title">알림</div>
        
        <div style="margin-bottom: 24px;">
            <div class="setting-row">
                <div>
                    <div class="setting-label">약 챙기기</div>
                    <div class="setting-sub">약 먹을 시간에 알려드려요</div>
                </div>
                <label class="toggle">
                    <input type="checkbox" id="toggle-pill" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div id="pill-sub-settings" style="display: none; padding-left: 24px; border-left: 2px solid var(--primary-container); margin-top: 8px;">
                <div class="setting-row">
                    <div>
                        <div class="setting-label">알림 소리</div>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" id="toggle-sound" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <div>
                        <div class="setting-label">알림 진동</div>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" id="toggle-vibrate" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- 커뮤니티 -->
        <div>
            <div class="setting-row">
                <div>
                    <div class="setting-label">우리 이야기</div>
                    <div class="setting-sub">새로운 소식을 확인하세요</div>
                </div>
                <label class="toggle">
                    <input type="checkbox" id="toggle-community-main" checked>
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div id="community-sub-settings" style="display: none; padding-left: 24px; border-left: 2px solid var(--primary-container); margin-top: 8px;">
                <div class="setting-row">
                    <div>
                        <div class="setting-label">이야기 알림</div>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" id="toggle-community" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>



    <!-- 화면 분위기 설정 추가 -->
    <div class="section-card">
        <div class="section-title">
            <span class="material-icons-round" style="font-size:18px">palette</span>
            <span>화면 분위기</span>
        </div>
        <div class="setting-sub">원하시는 밝기로 보실 수 있어요</div>
        <div class="theme-selector">
            <div class="theme-btn dark" id="theme-dark" onclick="setTheme('dark')">
                <span class="material-icons-round" style="display:block;margin-bottom:6px">dark_mode</span>
                편안한 어둠
            </div>
            <div class="theme-btn light" id="theme-light" onclick="setTheme('light')">
                <span class="material-icons-round" style="display:block;margin-bottom:6px">light_mode</span>
                따뜻하고 맑게
            </div>
        </div>
    </div>

    <div class="section-card">
        <div class="section-title">가족 케어</div>
        <div class="menu-item" onclick="location.href='guardian.html'">
            <div class="menu-left">
                <span class="material-icons-round menu-icon">family_restroom</span>
                <span class="menu-label">가족 카톡 알림 관리하기</span>
            </div>
            <span class="material-icons-round" style="color:rgba(255,255,255,0.2)">chevron_right</span>
        </div>
    </div>
    <div class="section-card">
        <div class="section-title">앱 정보</div>
        <div class="setting-row">
            <span class="setting-label">현재 버전</span>
            <span style="color:var(--primary-container); font-weight:700">v1.0.0</span>
        </div>
        <div class="menu-item" onclick="alert('이용약관 준비 중입니다.')">
            <div class="menu-left"><span class="menu-label">이용약관</span></div>
            <span class="material-icons-round" style="color:rgba(255,255,255,0.2)">chevron_right</span>
        </div>
    </div>

    <div class="section-card">
        <button class="logout-btn" id="logout-btn">로그아웃</button>
    </div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="location.href='dashboard.html'"><span class="nav-icon material-icons-round">home</span><span>홈</span></div>
  <div class="nav-item" onclick="location.href='stats.html'"><span class="nav-icon material-icons-round">bar_chart</span><span>건강 기록</span></div>
  <div class="nav-item" onclick="location.href='community.html'"><span class="nav-icon material-icons-round">group</span><span>우리 이야기</span></div>
  <div class="nav-item active"><span class="nav-icon material-icons-round">settings</span><span>설정</span></div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-app.js";
import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-auth.js";

const config={apiKey:"AIzaSyDpnPJnErnrTloHk3HFrsXHORUMvAiOq5w",authDomain:"pill-sajangnim.firebaseapp.com",projectId:"pill-sajangnim",storageBucket:"pill-sajangnim.firebasestorage.app",messagingSenderId:"648268791992",appId:"1:648268791992:web:41a92580aa1a58ae6bb44d"};
const app=initializeApp(config);
const auth=getAuth(app);

onAuthStateChanged(auth,(u)=>{
  let user = u;
  if(!user){
    const kakaoData = localStorage.getItem('yakmate_kakao_user');
    if(kakaoData) user = JSON.parse(kakaoData);
  }
  if(!user){window.location.href='./index.html';return;}
  const name=user.displayName||'사장님';
  const email=user.email||'';
  document.getElementById('profile-name').textContent=name;
  document.getElementById('profile-email').textContent=email;
  const avatar = document.getElementById('avatar-initial');
  if(user.photoURL && avatar) {
    avatar.innerHTML = `<img src="${user.photoURL}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
  } else if(avatar) {
    avatar.textContent=name[0].toUpperCase();
  }
});

// changeTheme 구버전 제거됨

document.getElementById('logout-btn').addEventListener('click',async()=>{
  if(!confirm('로그아웃 하시겠어요?'))return;
  await signOut(auth);
  localStorage.removeItem('yakmate_kakao_user');
  window.location.href='./index.html';
});

// 설정값 저장 및 불러오기
const settings = ['toggle-pill', 'toggle-sound', 'toggle-vibrate', 'toggle-community-main', 'toggle-community'];
const pillSub = document.getElementById('pill-sub-settings');
const commSub = document.getElementById('community-sub-settings');

function updateVisibility() {
    pillSub.style.display = document.getElementById('toggle-pill').checked ? 'block' : 'none';
    commSub.style.display = document.getElementById('toggle-community-main').checked ? 'block' : 'none';
}

settings.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const saved = localStorage.getItem(id);
    if (saved !== null) el.checked = saved === 'true';
    el.addEventListener('change', () => {
        localStorage.setItem(id, el.checked);
        updateVisibility();
    });
});
updateVisibility();

// 알림 권한 요청
document.getElementById('toggle-pill').addEventListener('change', async (e) => {
    if (e.target.checked) {
        if (!("Notification" in window)) {
            alert("이 브라우저는 알림 기능을 지원하지 않습니다.");
            e.target.checked = false;
            return;
        }
        const permission = await Notification.requestPermission();
        if (permission !== "granted") {
            alert("알림 권한이 거부되었습니다.\n\n[해결 방법]\n브라우저 주소창 왼쪽의 '자물쇠' 또는 '설정' 아이콘을 눌러 알림 권한을 '허용'으로 변경해주세요! 🔓");
            e.target.checked = false;
        } else {
            new Notification("알림 설정 완료! 💊", {
                body: "약 드실 시간에 맞춰 알림을 보내드릴게요.",
                icon: "favicon.ico"
            });
        }
    }
});
window.setTheme = function(theme) {
    if(theme === 'light') {
        document.body.classList.add('light-mode');
    } else {
        document.body.classList.remove('light-mode');
    }
    localStorage.setItem('yakmate_theme', theme);
    updateThemeUI();
};

function updateThemeUI() {
    const theme = localStorage.getItem('yakmate_theme') || 'dark';
    const darkBtn = document.getElementById('theme-dark');
    const lightBtn = document.getElementById('theme-light');
    if(darkBtn) darkBtn.classList.toggle('active', theme === 'dark');
    if(lightBtn) lightBtn.classList.toggle('active', theme === 'light');
}

// 테마 초기화
const initTheme = localStorage.getItem('yakmate_theme');
if(initTheme) setTheme(initTheme);
else updateThemeUI();
</script>
</body>
</html>
