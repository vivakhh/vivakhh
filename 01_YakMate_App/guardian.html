<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YakMate | 가족 케어</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root {
    --primary-container: #00e5ff;
    --background: #0b0e14;
    --surface-container: #1d2026;
    --surface-high: #272a31;
    --on-surface: #e1e2eb;
    --glass: rgba(29, 32, 38, 0.7);
    --gold: #D4AF37;
}

body.light-mode {
    --background: #fdfdfd;
    --on-surface: #1a1d23;
    --surface-container: #ffffff;
    --surface-high: #f0f2f5;
    --glass: rgba(255, 255, 255, 0.9);
    --gold: #8d6e63;
    --primary-container: #7c4dff;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
body { 
    font-family: 'Manrope', 'Noto Sans KR', sans-serif; 
    background: var(--background); 
    color: var(--on-surface);
    min-height: 100vh;
    padding-bottom: 120px;
}

.header { padding: 32px 24px; position: sticky; top: 0; background: rgba(11, 14, 20, 0.8); backdrop-filter: blur(20px); z-index: 100; display: flex; align-items: center; gap: 16px; }
.btn-back { background: rgba(255, 255, 255, 0.05); border: none; border-radius: 12px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; }
.header-title { font-size: 20px; font-weight: 700; color: #fff; }

.content { padding: 0 24px; }

.info-card { 
    background: linear-gradient(135deg, rgba(0, 229, 255, 0.1) 0%, rgba(124, 77, 255, 0.1) 100%); 
    border-radius: 32px; 
    padding: 32px; 
    color: #fff; 
    margin-top: 16px;
    margin-bottom: 32px;
    border: 1px solid rgba(0, 229, 255, 0.1);
}
.info-title { font-size: 17px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.info-desc { font-size: 13px; opacity: 0.6; line-height: 1.7; }

.section-title { font-size: 14px; font-weight: 700; color: var(--gold); margin-bottom: 20px; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: space-between; }

.guardian-card { 
    background: var(--glass); 
    border-radius: 28px; 
    padding: 24px; 
    margin-bottom: 16px; 
    border: 1px solid rgba(255, 255, 255, 0.03); 
    display: flex; 
    align-items: center; 
    justify-content: space-between;
}
.guardian-info { display: flex; align-items: center; gap: 16px; flex: 1; }
.guardian-avatar { width: 48px; height: 48px; border-radius: 16px; background: rgba(255, 255, 255, 0.03); display: flex; align-items: center; justify-content: center; font-size: 24px; }
.guardian-name { font-size: 16px; font-weight: 700; color: #fff; }
.guardian-relation { font-size: 12px; color: rgba(255, 255, 255, 0.3); margin-top: 2px; }
.delete-btn { background: rgba(255, 110, 132, 0.1); border: none; color: #ff6e84; border-radius: 10px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

.add-card { 
    background: var(--glass); 
    border-radius: 32px; 
    padding: 32px; 
    margin-bottom: 32px; 
    border: 1px solid rgba(255, 255, 255, 0.05); 
}
.add-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 24px; }
.input-group { margin-bottom: 20px; }
.input-label { font-size: 12px; font-weight: 700; color: rgba(255, 255, 255, 0.3); margin-bottom: 8px; display: block; letter-spacing: 0.5px; }
.input-field { 
    width: 100%; 
    background: rgba(255, 255, 255, 0.02); 
    border: 1px solid rgba(255, 255, 255, 0.05); 
    border-radius: 16px; 
    padding: 16px; 
    font-family: inherit; 
    font-size: 14px; 
    color: #fff; 
    outline: none; 
    transition: all 0.3s; 
}
.input-field:focus { border-color: var(--primary-container); background: rgba(0, 229, 255, 0.03); }

.relation-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
.relation-btn { 
    padding: 12px 4px; 
    border: 1px solid rgba(255, 255, 255, 0.05); 
    border-radius: 12px; 
    background: rgba(255, 255, 255, 0.02); 
    font-family: inherit; 
    font-size: 12px; 
    color: rgba(255, 255, 255, 0.4); 
    cursor: pointer; 
    transition: all 0.3s; 
}
.relation-btn.selected { border-color: var(--primary-container); background: rgba(0, 229, 255, 0.1); color: var(--primary-container); font-weight: 700; }

.add-btn { 
    width: 100%; 
    padding: 18px; 
    background: var(--primary-container); 
    color: #000; 
    border: none; 
    border-radius: 16px; 
    font-size: 15px; 
    font-weight: 700; 
    cursor: pointer; 
    margin-top: 12px;
}

.kakao-section { 
    background: rgba(254, 229, 0, 0.05); 
    border: 1px solid rgba(254, 229, 0, 0.1); 
    border-radius: 32px; 
    padding: 32px; 
    margin-bottom: 32px; 
}
.kakao-btn { 
    width: 100%; 
    padding: 18px; 
    background: #FEE500; 
    color: #191919; 
    border: none; 
    border-radius: 16px; 
    font-size: 15px; 
    font-weight: 700; 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 10px; 
}

.empty { text-align: center; padding: 48px; color: rgba(255, 255, 255, 0.15); font-size: 14px; line-height: 1.8; font-weight: 500; }

.bottom-nav { position: fixed; bottom: 24px; left: 24px; right: 24px; background: rgba(16, 19, 26, 0.9); backdrop-filter: blur(20px); border-radius: 24px; padding: 12px; display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid rgba(255, 255, 255, 0.05); z-index: 100; }
.nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(225, 226, 235, 0.3); font-size: 11px; text-decoration: none; gap: 4px; transition: all 0.3s; }
.nav-item.active { color: var(--primary-container); }
.nav-icon { font-size: 22px; }
</style>
</head>
<body>
<script>
  (function() {
    const theme = localStorage.getItem('yakmate_theme');
    if (theme === 'light') document.body.classList.add('light-mode');
  })();
</script>
<div class="header">
    <button class="btn-back" onclick="location.href='settings.html'">
        <span class="material-icons-round">arrow_back</span>
    </button>
    <div class="header-title">가족 케어</div>
</div>

<div class="content">
  <div class="info-card">
    <div class="info-title">
        <span class="material-icons-round">favorite</span>
        <span>가족 케어 안내</span>
    </div>
    <div class="info-desc">약 드시는 것을 잊으셨을 때 가족에게 알림을 보내 함께 챙길 수 있는 따뜻한 서비스입니다.</div>
  </div>

  <div class="section-title">
      <span>등록된 가족 <span id="guardian-count" style="color:var(--primary-container)"></span></span>
  </div>
  <div id="guardian-list"></div>

  <div class="add-card" id="add-card">
    <div class="add-title">➕ 가족 추가하기</div>
    <div class="input-group">
      <label class="input-label">이름</label>
      <input class="input-field" id="guardian-name" placeholder="성함을 입력해주세요">
    </div>
    <div class="input-group">
      <label class="input-label">전화번호</label>
      <input class="input-field" id="guardian-phone" placeholder="010-0000-0000" type="tel">
    </div>
    </div>
    
  </div>

  <div class="kakao-section">
    <div class="section-title" style="color:#FEE500">가족 알림</div>
    <p style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:24px;line-height:1.6">
      가족에게 약 복용 상태를<br>문자(SMS)로 즉시 알릴 수 있습니다.
    </p>
    <button class="kakao-btn" id="sms-btn" style="margin-bottom:12px;background:#1a73e8;">
      <span class="material-icons-round" style="font-size:20px">sms</span>
      <span>문자로 알리기 (SMS)</span>
    </button>
    <button class="kakao-btn" id="whatsapp-btn" style="background:#25D366;">
      <span class="material-icons-round" style="font-size:20px">chat</span>
      <span>WhatsApp으로 알리기</span>
    </button>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="location.href='dashboard.html'"><span class="nav-icon material-icons-round">home</span><span>홈</span></div>
  <div class="nav-item" onclick="location.href='stats.html'"><span class="nav-icon material-icons-round">bar_chart</span><span>건강 기록</span></div>
  <div class="nav-item" onclick="location.href='community.html'"><span class="nav-icon material-icons-round">group</span><span>우리 이야기</span></div>
  <div class="nav-item active"><span class="nav-icon material-icons-round">settings</span><span>설정</span></div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-auth.js";
import{getFirestore,doc,getDoc,setDoc,updateDoc}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-firestore.js";

const config={apiKey:"AIzaSyDpnPJnErnrTloHk3HFrsXHORUMvAiOq5w",authDomain:"pill-sajangnim.firebaseapp.com",projectId:"pill-sajangnim",storageBucket:"pill-sajangnim.firebasestorage.app",messagingSenderId:"648268791992",appId:"1:648268791992:web:41a92580aa1a58ae6bb44d"};
const app=initializeApp(config);
const auth=getAuth(app);
const db=getFirestore(app);
let currentUser=null;
let selectedRelation='';
let guardians=[];

window.selectRelation=function(btn,relation){
  document.querySelectorAll('.relation-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedRelation=relation;
};

const emojis={아내:'👩',남편:'👨',자녀:'👦',부모님:'👴',형제:'🧑',친구:'😊',요양사:'👩‍⚕️',기타:'👤'};

function renderGuardians(){
  const list=document.getElementById('guardian-list');
  const count=document.getElementById('guardian-count');
  const addCard=document.getElementById('add-card');
  
  count.textContent=`(${guardians.length}/2명)`;
  
  if(guardians.length>=2){
    addCard.style.display='none';
    document.querySelector('.kakao-section').style.marginTop='24px';
  }

  if(guardians.length===0){
    list.innerHTML='<div class="empty">아직 등록된 가족이 없습니다.<br>아래에서 소중한 가족을 추가해보세요. 💙</div>';
    return;
  }
  
  list.innerHTML=guardians.map((g,i)=>`
    <div class="guardian-card">
      <div class="guardian-info">
        <div class="guardian-avatar">${emojis[g.relation]||'👤'}</div>
        <div style="flex:1">
          <div class="guardian-name">${g.name}</div>
          <div class="guardian-relation">${g.relation} · ${g.phone}</div>
        </div>
        <button class="delete-btn" onclick="deleteGuardian(${i})">
            <span class="material-icons-round" style="font-size:18px">close</span>
        </button>
      </div>
    </div>
  `).join('');
}

window.deleteGuardian=async function(index){
  if(!confirm('이 가족을 삭제할까요?'))return;
  guardians.splice(index,1);
  const ref=doc(db,'users',currentUser.uid);
  await updateDoc(ref,{guardians});
  location.reload();
};

onAuthStateChanged(auth,async(u)=>{
  let user = u;
  if(!user){
    const kakaoData = localStorage.getItem('yakmate_kakao_user');
    if(kakaoData) user = JSON.parse(kakaoData);
  }
  if(!user){window.location.href='./index.html';return;}
  currentUser=user;
  const snap=await getDoc(doc(db,'users',user.uid));
  guardians=snap.exists()&&snap.data().guardians?snap.data().guardians:[];
  renderGuardians();
});

document.getElementById('add-btn')?.addEventListener('click',async()=>{
  const name=document.getElementById('guardian-name').value.trim();
  const phone=document.getElementById('guardian-phone').value.trim();
  if(!name||!phone){alert('이름과 전화번호를 입력해주세요!');return;}
  if(guardians.length>=2){alert('최대 2명까지 가능합니다.');return;}
  guardians.push({name,phone,relation:'가족'});
  const ref=doc(db,'users',currentUser.uid);
  const snap=await getDoc(ref);
  if(snap.exists()){await updateDoc(ref,{guardians});}
  else{await setDoc(ref,{guardians});}
  renderGuardians();
  location.reload();
});

document.getElementById('sms-btn').addEventListener('click',()=>{
  if(guardians.length===0){alert('먼저 가족을 등록해주세요!');return;}
  const userName=currentUser.displayName||'사장님';
  const msg='[약메이트 알림] 💊\n'+userName+'님이 오늘 약을 아직 안 챙기신 것 같아요.\n잠깐 확인해주시겠어요? 😊\n\n- 약메이트 가족 케어';
  const phone=guardians[0].phone.replace(/-/g,'');
  window.location.href='sms:'+phone+'?body='+encodeURIComponent(msg);
});

document.getElementById('whatsapp-btn').addEventListener('click',()=>{
  if(guardians.length===0){alert('먼저 가족을 등록해주세요!');return;}
  const userName=currentUser.displayName||'사장님';
  const msg='[YakMate Alert] 💊\n'+userName+' has not taken their medication yet today.\nCould you check in? 😊\n\n- YakMate Family Care';
  const phone=guardians[0].phone.replace(/-/g,'').replace(/^0/,'82');
  window.open('https://wa.me/'+phone+'?text='+encodeURIComponent(msg),'_blank');
});
</script>
</body>
</html>
