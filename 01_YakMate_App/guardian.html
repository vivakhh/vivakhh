<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YakMate | 가족 케어</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@300;400;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <style>
        body {
            background: var(--bg-main);
            color: var(--on-bg);
            padding-bottom: 120px;
        }

        .header {
            padding: 32px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-back {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--on-card);
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .header-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--on-card);
            letter-spacing: -0.5px;
        }

        .info-card {
            background: rgba(212, 175, 55, 0.05);
            border: 1px dashed var(--primary);
            border-radius: 32px;
            padding: 28px;
            margin: 0 24px 32px;
            display: flex;
            gap: 16px;
        }

        .info-icon {
            font-size: 32px;
            color: var(--primary);
        }

        .info-text {
            font-size: 14px;
            line-height: 1.6;
            font-weight: 600;
            color: var(--on-card);
        }

        .section-title {
            padding: 0 24px;
            font-size: 13px;
            font-weight: 800;
            color: var(--text-dim);
            
            letter-spacing: 1.5px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .guardian-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px;
            margin: 0 24px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
        }

        .guardian-avatar {
            width: 56px;
            height: 56px;
            border-radius: 20px;
            background: var(--bg-float);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border: 1px solid var(--border);
        }

        .guardian-name {
            font-size: 18px;
            font-weight: 800;
            color: var(--on-card);
        }

        .guardian-relation {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 600;
            margin-top: 2px;
        }

        .delete-btn {
            background: rgba(255, 110, 132, 0.1);
            border: 1px solid rgba(255, 110, 132, 0.2);
            color: #ff6e84;
            border-radius: 14px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 32px;
            margin: 16px 24px 32px;
            box-shadow: var(--shadow);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            font-size: 12px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 8px;
            display: block;
            
        }

        .input-field {
            width: 100%;
            background: var(--bg-float);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            color: var(--on-card);
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            border-color: var(--primary);
        }

        .add-btn {
            width: 100%;
            padding: 20px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 25px var(--primary-glow);
            margin-top: 12px;
        }

        .kakao-section {
            background: rgba(254, 229, 0, 0.05);
            border: 1px solid rgba(254, 229, 0, 0.1);
            border-radius: 32px;
            padding: 32px;
            margin: 0 24px 32px;
        }
    </style>

    





</head>
<body>
    <script>
        (function() {
            const theme = localStorage.getItem('yakmate_theme');
            if (theme === 'light') document.body.classList.add('light-mode');
        })();
    </script>
    <div class="header">
        <button class="btn-back" onclick="location.href='settings.html'">
            <span class="material-icons-round">arrow_back</span>
        </button>
        <div class="header-title">가족 케어</div>
    </div>

    <div class="info-card">
        <span class="material-icons-round info-icon">favorite</span>
        <div class="info-text">약을 드시는 것을 잊으셨을 때, 등록된 가족에게 알림을 보내 함께 건강을 지킬 수 있는 따뜻한 서비스입니다.</div>
    </div>

    <div class="section-title">
        <span>등록된 가족 <span id="guardian-count" style="color:var(--primary)"></span></span>
    </div>
    <div id="guardian-list"></div>

    <div class="add-card" id="add-card">
        <div class="input-group">
            <label class="input-label">이름</label>
            <input class="input-field" id="guardian-name" placeholder="가족의 성함을 입력해주세요">
        </div>
        <div class="input-group" style="margin-bottom: 24px;">
            <label class="input-label">전화번호</label>
            <input class="input-field" id="guardian-phone" placeholder="010-0000-0000" type="tel">
        </div>
        <button class="add-btn" id="add-btn">가족 추가하기</button>
    </div>

    <div class="kakao-section">
        <div style="font-size: 16px; font-weight: 800; color: var(--primary); margin-bottom: 8px; display: flex; align-items: center; gap: 8px;">
            <span class="material-icons-round">sms</span>
            가족에게 직접 알리기
        </div>
        <p style="font-size:13px; color:var(--text-dim); margin-bottom:24px; line-height:1.6; font-weight: 600;">
            가족에게 현재 복용 상태를 문자(SMS)로 즉시 보낼 수 있습니다.
        </p>
        <button onclick="sendSMS()" style="width:100%; padding:18px; background:var(--primary); color:#fff; border:none; border-radius:18px; font-size:15px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; box-shadow: 0 10px 20px rgba(26,115,232,0.2);">
            <span class="material-icons-round">send</span>
            문자로 알리기 (SMS)
        </button>
    </div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-auth.js";
import{getFirestore,doc,getDoc,setDoc,updateDoc}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-firestore.js";

const config={apiKey:"AIzaSyDpnPJnErnrTloHk3HFrsXHORUMvAiOq5w",authDomain:"pill-sajangnim.firebaseapp.com",projectId:"pill-sajangnim",storageBucket:"pill-sajangnim.firebasestorage.app",messagingSenderId:"648268791992",appId:"1:648268791992:web:41a92580aa1a58ae6bb44d"};
const app=initializeApp(config);
const auth=getAuth(app);
const db=getFirestore(app);
let currentUser=null;
let selectedRelation='';
let guardians=[];

window.selectRelation=function(btn,relation){
  document.querySelectorAll('.relation-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedRelation=relation;
};

const emojis={아내:'👩',남편:'👨',자녀:'👦',부모님:'👴',형제:'🧑',친구:'😊',요양사:'👩‍⚕️',기타:'👤'};

function renderGuardians(){
  const list=document.getElementById('guardian-list');
  const count=document.getElementById('guardian-count');
  const addCard=document.getElementById('add-card');
  
  count.textContent=`(${guardians.length}/2명)`;
  
  if(guardians.length>=2){
    addCard.style.display='none';
    document.querySelector('.kakao-section').style.marginTop='24px';
  }

  if(guardians.length===0){
    list.innerHTML='<div class="empty">아직 등록된 가족이 없습니다.<br>아래에서 소중한 가족을 추가해보세요. 💙</div>';
    return;
  }
  
  list.innerHTML=guardians.map((g,i)=>`
    <div class="guardian-card">
      <div class="guardian-info">
        <div class="guardian-avatar">${emojis[g.relation]||'👤'}</div>
        <div style="flex:1">
          <div class="guardian-name">${g.name}</div>
          <div class="guardian-relation">${g.relation} · ${g.phone}</div>
        </div>
        <button class="delete-btn" onclick="deleteGuardian(${i})">
            <span class="material-icons-round" style="font-size:18px">close</span>
        </button>
      </div>
    </div>
  `).join('');
}

window.deleteGuardian=async function(index){
  if(!confirm('이 가족을 삭제할까요?'))return;
  guardians.splice(index,1);
  const ref=doc(db,'users',currentUser.uid);
  await updateDoc(ref,{guardians});
  location.reload();
};

onAuthStateChanged(auth,async(u)=>{
  let user = u;
  if(!user){
    const kakaoData = localStorage.getItem('yakmate_kakao_user');
    if(kakaoData) user = JSON.parse(kakaoData);
  }
  if(!user){const g={uid:'guest_'+Math.random().toString(36).substr(2,9),displayName:'사장님',isGuest:true};localStorage.setItem('yakmate_user',JSON.stringify(g));user=g;}
  currentUser=user;
  const snap=await getDoc(doc(db,'users',user.uid));
  guardians=snap.exists()&&snap.data().guardians?snap.data().guardians:[];
  renderGuardians();
});

document.getElementById('add-btn')?.addEventListener('click',async()=>{
  const name=document.getElementById('guardian-name').value.trim();
  const phone=document.getElementById('guardian-phone').value.trim();
  if(!name||!phone){alert('이름과 전화번호를 입력해주세요!');return;}
  if(guardians.length>=2){alert('최대 2명까지 가능합니다.');return;}
  guardians.push({name,phone,relation:'가족'});
  const ref=doc(db,'users',currentUser.uid);
  const snap=await getDoc(ref);
  if(snap.exists()){await updateDoc(ref,{guardians});}
  else{await setDoc(ref,{guardians});}
  renderGuardians();
  location.reload();
});

window.sendSMS = () => {
  if(guardians.length===0){alert('먼저 가족을 등록해주세요!');return;}
  const userName=currentUser.displayName||'사장님';
  const msg='[약메이트 알림] 💊\n'+userName+'님이 오늘 약을 아직 안 챙기신 것 같아요.\n잠깐 확인해주시겠어요? 😊\n\n- 약메이트 가족 케어';
  const phone=guardians[0].phone.replace(/-/g,'');
  window.location.href='sms:'+phone+'?body='+encodeURIComponent(msg);
};
</script>


    <nav class="nav-bar">
        <a href="dashboard.html" class="nav-item">
            <span class="material-icons-round">home</span>
            <span class="nav-label">HOME</span>
        </a>
        <a href="stats.html" class="nav-item">
            <span class="material-icons-round">analytics</span>
            <span class="nav-label">HEALTH</span>
        </a>
        <a href="community.html" class="nav-item">
            <span class="material-icons-round">forum</span>
            <span class="nav-label">STORY</span>
        </a>
        <a href="settings.html" class="nav-item active">
            <span class="material-icons-round">person</span>
            <span class="nav-label">CENTER</span>
        </a>
    </nav>


</body>
</html>
