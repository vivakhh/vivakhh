<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YakMate | 시간표 관리</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@300;400;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <style>
        body {
            background: var(--bg-main);
            color: var(--on-bg);
            padding-bottom: 140px;
        }

        .header {
            padding: 32px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-back {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--on-card);
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .header-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--on-card);
            letter-spacing: -0.5px;
        }

        .info-card {
            background: rgba(212, 175, 55, 0.05);
            border: 1px dashed var(--primary);
            border-radius: 32px;
            padding: 28px;
            margin: 0 24px 32px;
            display: flex;
            gap: 16px;
        }

        .info-text {
            font-size: 14px;
            line-height: 1.6;
            font-weight: 600;
            color: var(--on-card);
        }

        .section-title {
            padding: 0 24px;
            font-size: 13px;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
        }

        .routine-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px;
            margin: 0 24px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
        }

        .routine-time {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
            font-family: 'Space Grotesk', sans-serif;
        }

        .routine-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--on-card);
            margin-top: 2px;
        }

        .btn-delete {
            background: rgba(255, 110, 132, 0.1);
            border: 1px solid rgba(255, 110, 132, 0.2);
            color: #ff6e84;
            border-radius: 14px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 32px;
            margin: 16px 24px 32px;
            box-shadow: var(--shadow);
        }

        .btn-save {
            position: fixed;
            bottom: 40px;
            left: 24px;
            right: 24px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 24px;
            padding: 24px;
            font-weight: 800;
            font-size: 17px;
            cursor: pointer;
            box-shadow: 0 15px 40px var(--primary-glow);
            z-index: 1000;
        }
    </style>
</head>
<body>
    <script>
        (function() {
            const theme = localStorage.getItem('yakmate_theme');
            if (theme === 'light') document.body.classList.add('light-mode');
        })();
    </script>
    <div class="header">
        <button class="btn-back" onclick="location.href='dashboard.html'">
            <span class="material-icons-round">arrow_back</span>
        </button>
        <div class="header-title">시간표 관리</div>
    </div>

    <div class="info-card">
        <div class="info-text">하루 중 소중한 사장님을 위해 언제 챙겨드리면 좋을까요? 시간을 설정해주시면 그에 맞춰 정성껏 알려드릴게요. 🌸</div>
    </div>

    <div class="section-title">현재 설정된 시간</div>
    <div id="routine-list"></div>

        <div class="section-title" style="margin-top: 32px;">새로운 약 추가</div>
        <div class="add-card">
            <div style="margin-bottom: 16px;">
                <label style="font-size: 12px; font-weight: 800; color: var(--primary); display: block; margin-bottom: 8px; text-transform: uppercase;">복용 시간 ⏰</label>
                <input type="time" id="new-time" style="width:100%; background:var(--bg-float); border:1px solid var(--border); border-radius:18px; padding:20px; color:var(--on-card); font-size:24px; font-weight:800; text-align:center; outline:none;" value="08:00">
            </div>
            <div style="margin-bottom: 16px;">
                <label style="font-size: 12px; font-weight: 800; color: var(--primary); display: block; margin-bottom: 8px; text-transform: uppercase;">약 이름 🔍</label>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="new-name" placeholder="약 이름 입력 (예: 아스피린)" style="flex:1; background:var(--bg-float); border:1px solid var(--border); border-radius:18px; padding:16px 20px; color:var(--on-card); font-size:16px; font-weight:600; outline:none;">
                    <button onclick="searchDrug()" style="padding:16px 20px; background:var(--primary); border:none; border-radius:18px; color:#000; font-weight:800; cursor:pointer; white-space:nowrap;">검색</button>
                </div>
                <div id="drug-result" style="margin-top:12px; display:none; background:var(--bg-float); border:1px solid var(--border); border-radius:16px; padding:16px;"></div>
            </div>
            <button id="btn-add" style="width:100%; padding:18px; background:var(--bg-float); border:1px solid var(--border); border-radius:18px; color: var(--on-card); font-weight:800; cursor:pointer;">+ 약 추가하기 💊</button>
        </div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-auth.js";
import{getFirestore,doc,getDoc,setDoc}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-firestore.js";

const config={apiKey:"AIzaSyDpnPJnErnrTloHk3HFrsXHORUMvAiOq5w",authDomain:"pill-sajangnim.firebaseapp.com",projectId:"pill-sajangnim",storageBucket:"pill-sajangnim.firebasestorage.app",messagingSenderId:"648268791992",appId:"1:648268791992:web:41a92580aa1a58ae6bb44d"};
const app=initializeApp(config);
const auth=getAuth(app);
const db=getFirestore(app);

let currentUser = null;
let routine = [];

onAuthStateChanged(auth, async user => {
    let u = user;
    if(!u){
        const kakaoData = localStorage.getItem('yakmate_kakao_user');
        if(kakaoData) u = JSON.parse(kakaoData);
    }
    var storedUser = JSON.parse(localStorage.getItem('yakmate_user') || 'null'); if(!u && !storedUser){ window.location.href='./index.html'; return; } if(!u && storedUser) u = storedUser;
    currentUser = u;
    
    // 기본 루틴 불러오기
    const snap = await getDoc(doc(db, 'users', u.uid, 'settings', 'routine'));
    if(snap.exists() && snap.data().meds) {
        routine = snap.data().meds;
    } else {
        routine = [
            {id:'m1', name:'아침 약', time:'08:00'},
            {id:'m2', name:'점심 약', time:'13:00'},
            {id:'m3', name:'저녁 약', time:'19:00'}
        ];
    }
    renderRoutine();
});

function renderRoutine() {
    const list = document.getElementById('routine-list');
    if(routine.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-dim);font-size:15px;">설정된 시간표가 없습니다.<br>사장님만의 건강 루틴을 만들어보세요! ✨</div>';
        return;
    }
    list.innerHTML = routine.map((m, i) => `
        <div class="routine-item">
            <div>
                <div class="routine-time">${m.time}</div>
                <div class="routine-name">약속 시간</div>
            </div>
            <button class="btn-delete" onclick="deleteItem(${i})"><span class="material-icons-round">close</span></button>
        </div>
    `).join('');
}

window.deleteItem = (idx) => {
    routine.splice(idx, 1);
    renderRoutine();
};

document.getElementById('btn-add').addEventListener('click', () => {
    const nameEl = document.getElementById('new-name');
        const name = nameEl ? (nameEl.value.trim() || '약 복용') : '약 복용';
        const time = document.getElementById('new-time').value;
    if(!time) { alert('시간을 선택해주세요!'); return; }
    
    routine.push({ id: 'm'+Date.now(), name: time + ' 약 드시는 시간', time });
    routine.sort((a, b) => a.time.localeCompare(b.time));
    
    renderRoutine();
});

document.getElementById('btn-save').addEventListener('click', async () => {
    if(routine.length === 0) {
        if(!confirm('시간표가 하나도 없습니다. 그래도 저장할까요?')) return;
    }
    
    try {
        const ref = doc(db, 'users', currentUser.uid, 'settings', 'routine');
        await setDoc(ref, { meds: routine, updatedAt: new Date() });
        
        // 오늘 날짜 데이터도 즉시 갱신할지 확인
        if(confirm('저장되었습니다! 오늘 남은 일정도 이 시간표대로 즉시 변경할까요?')) {
            const offset = 9 * 60 * 60 * 1000;
            const kst = new Date(new Date().getTime() + offset);
            const today = kst.toISOString().split('T')[0];
            
            // 기존 daily 데이터 가져오기 (이미 먹은 약 체크 상태 보존을 위해)
            const dRef = doc(db, 'users', currentUser.uid, 'daily', today);
            const dSnap = await getDoc(dRef);
            let dailyMeds = routine.map(r => ({...r, taken: false}));
            
            if(dSnap.exists() && dSnap.data().meds) {
                const existing = dSnap.data().meds;
                dailyMeds = routine.map(r => {
                    const match = existing.find(e => e.name === r.name && e.time === r.time);
                    return { ...r, taken: match ? match.taken : false };
                });
            }
            
            await setDoc(dRef, { meds: dailyMeds, updatedAt: new Date() });
        }
        
        window.location.href = 'dashboard.html';
    } catch(e) {
        alert('저장 중 오류가 발생했습니다: ' + e.message);
    }
});

  {name:'프레드니솔론', desc:'염증·자가면역 치료 (스테로이드)', time:'식후'},
  {name:'레보티록신', desc:'갑상선 호르몬 보충', time:'아침 공복'},
  {name:'알로퓨리놀', desc:'통풍 치료 (요산 감소)', time:'식후'},
  {name:'딜티아젬', desc:'부정맥·협심증 치료', time:'식전/식후 무관'},
  {name:'실로스타졸', desc:'혈전 예방·말초혈관질환', time:'식전 30분'},
];

window.searchDrug = function() {
  const name = document.getElementById('new-name').value.trim().toLowerCase();
  if (!name) { alert('약 이름을 입력해주세요'); return; }
  const resultDiv = document.getElementById('drug-result');
  resultDiv.style.display = 'block';
  const matches = DRUG_DB.filter(d => d.name.toLowerCase().includes(name) || name.includes(d.name.toLowerCase()));
  if (matches.length === 0) {
    resultDiv.innerHTML = '<p style="color:var(--on-card);opacity:0.6;font-size:13px;">검색 결과가 없어요. 약 이름을 직접 입력하고 추가하세요 💊</p>';
    return;
  }
  resultDiv.innerHTML = matches.map(d => `
    <div onclick="selectDrug('${d.name}')" style="padding:12px 8px;border-bottom:1px solid var(--border);cursor:pointer;">
      <div style="font-weight:700;color:var(--on-card);font-size:14px;">${d.name}</div>
      <div style="font-size:12px;color:var(--on-card);opacity:0.6;margin-top:2px;">${d.desc} · ${d.time}</div>
    </div>`).join('');
}

window.selectDrug = function(name) {
  document.getElementById('new-name').value = name;
  document.getElementById('drug-result').style.display = 'none';
}
</script><script>

  {name:'아스피린', desc:'혈전 예방 / 해열·진통·소염', time:'식후'},
  {name:'노바스크', desc:'고혈압·협심증 치료 (칼슘길항제)', time:'식전/식후 무관'},
  {name:'암로디핀', desc:'고혈압 치료 (칼슘길항제)', time:'식전/식후 무관'},

  {name:'오메프라졸', desc:'위산 억제·위궤양 치료', time:'식전 30분'},

  {name:'와파린', desc:'혈전 예방 (항응고제)', time:'일정한 시간'},

function searchDrug() {

  if (!input) return;
  var name = input.value.trim().toLowerCase();
