<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YakMate | 페이지를 찾을 수 없어요</title>
  <style>
    :root {
      --primary: #B8963E;
      --bg: #F5F3EF;
      --text: #1a1a1a;
      --text-dim: #888;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .emoji { font-size: 72px; margin-bottom: 24px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .code { font-size: 13px; font-weight: 700; color: var(--primary); letter-spacing: 2px; margin-bottom: 12px; }
    h1 { font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 12px; line-height: 1.4; }
    p { font-size: 15px; color: var(--text-dim); line-height: 1.6; margin-bottom: 40px; max-width: 280px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; background: var(--primary); color: white; font-size: 16px; font-weight: 700; padding: 16px 36px; border-radius: 50px; text-decoration: none; }
    .logo { margin-top: 60px; font-size: 13px; color: var(--text-dim); font-weight: 600; }
  </style>
</head>
<body>
  <div class="emoji">🌿</div>
  <div class="code">404</div>
  <h1>페이지를 찾을 수 없어요</h1>
  <p>주소가 잘못됐거나<br>이미 사라진 페이지예요.<br>천천히 가도 괜찮아요 😊</p>
  <a href="/dashboard" class="btn">🏠 홈으로 돌아가기</a>
  <div class="logo">YakMate 약메이트</div>
</body>
</html>
