<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YakMate | 약메이트</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="global.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
body { font-family: "Manrope","Noto Sans KR",sans-serif; background: var(--bg-main); color: var(--on-bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; overflow-y: auto; }
.bg-glow { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 600px; height: 600px; background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%); z-index: -1; filter: blur(80px); }
.container { width: 100%; max-width: 400px; position: relative; }
.logo-area { text-align: center; margin-bottom: 56px; }
.logo-icon { font-size: 64px; display: block; margin-bottom: 16px; filter: drop-shadow(0 0 20px rgba(0,229,255,0.4)); }
.logo-title { font-size: 36px; font-weight: 700; color: var(--on-card); letter-spacing: -1px; font-family: "Space Grotesk",sans-serif; }
.logo-title span { color: var(--primary); }
.logo-sub { font-size: 15px; color: var(--on-bg); opacity: 0.5; margin-top: 12px; line-height: 1.6; }
.login-card { background: var(--bg-card); backdrop-filter: blur(20px); border-radius: 40px; padding: 40px 32px; border: 1px solid var(--border); box-shadow: 0 24px 80px rgba(0,0,0,0.4); }
.card-title { font-size: 20px; font-weight: 700; color: var(--on-card); text-align: center; margin-bottom: 12px; }
.card-desc { font-size: 14px; color: var(--on-bg); opacity: 0.5; text-align: center; margin-bottom: 36px; line-height: 1.6; }
.btn-login { width: 100%; padding: 18px; border-radius: 20px; border: none; font-family: inherit; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: all 0.3s cubic-bezier(0.4,0,0.2,1); margin-bottom: 16px; }
.btn-google { background: #fff; color: #000; }
.btn-google:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(255,255,255,0.1); }
.btn-kakao { background: #FEE500; color: #191919; }
.btn-kakao:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(254,229,0,0.2); }
.btn-guest { background: transparent; color: var(--on-bg); border: 1px solid var(--border); margin-top: 8px; }
.btn-guest:hover { background: var(--border); }
.footer-note { text-align: center; margin-top: 32px; font-size: 12px; color: var(--on-bg); opacity: 0.3; line-height: 1.8; }
.error-msg { display: none; background: rgba(255,110,132,0.2); color: #ff6e84; border-radius: 16px; padding: 14px; font-size: 13px; text-align: center; margin-top: 16px; border: 1px solid #ff6e84; }
.error-msg.active { display: block; }
</style>
</head>
<body>
<script>(function(){const t=localStorage.getItem("yakmate_theme");if(t==="light")document.body.classList.add("light-mode");})();</script>
<div class="bg-glow"></div>
<div class="container">
  <div class="logo-area">
    <span class="logo-icon">💊</span>
    <h1 class="logo-title">YAK<span>MATE</span></h1>
    <p class="logo-sub">가장 따뜻한 약 챙겨주는 친구<br>오늘도 사장님의 건강을 지킵니다.</p>
  </div>
  <div class="login-card">
    <h2 class="card-title">시작하기</h2>
    <p class="card-desc">사장님만의 특별한 약 드시는 시간표를<br>지금 바로 시작해보세요.</p>
    <button class="btn-login btn-guest" id="btn-guest">로그인 없이 시작하기 (게스트)</button>
    <button class="btn-login btn-google" id="btn-google">
      <svg style="width:20px;height:20px" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google로 계속하기
    </button>
    <button class="btn-login btn-kakao" id="btn-kakao">
      <svg style="width:20px;height:20px" viewBox="0 0 24 24"><path fill="#191919" d="M12 3C6.48 3 2 6.48 2 10.8c0 2.7 1.6 5.1 4 6.6l-1 3.6 4.2-2.8c.9.2 1.8.3 2.8.3 5.52 0 10-3.48 10-7.8S17.52 3 12 3z"/></svg>
      카카오로 계속하기
    </button>
    <div class="error-msg" id="error-msg"></div>
  </div>
  <p class="footer-note">사장님의 건강한 내일을 위해<br>언제나 곁에 있겠습니다.</p>
</div>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/1.43.1/kakao.min.js" crossorigin="anonymous"></script>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-app.js";
import{getAuth,onAuthStateChanged,GoogleAuthProvider,signInWithPopup,signInWithRedirect,getRedirectResult}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-auth.js";
const config={apiKey:"AIzaSyDpnPJnErnrTloHk3HFrsXHORUMvAiOq5w",authDomain:"pill-sajangnim.firebaseapp.com",projectId:"pill-sajangnim",storageBucket:"pill-sajangnim.firebasestorage.app",messagingSenderId:"648268791992",appId:"1:648268791992:web:41a92580aa1a58ae6bb44d"};
const app=initializeApp(config);
const auth=getAuth(app);
window.kakaoInit = false;
try {
  if (typeof Kakao !== 'undefined') {
    Kakao.init("378387c805534e113c68d0c246933822");
    window.kakaoInit = Kakao.isInitialized();
  }
} catch (e) { console.error("Kakao Init Error:", e); }

onAuthStateChanged(auth, u => {
  if (u) {
    const user = {
      uid: u.uid,
      displayName: u.displayName || '사장님',
      photoURL: u.photoURL || '',
      email: u.email || '',
      isGuest: false
    };
    localStorage.setItem("yakmate_user", JSON.stringify(user));
    window.location.href = "./dashboard.html";
  }
});
getRedirectResult(auth).then(r => {
  if (r?.user) {
    const u = r.user;
    const user = {
      uid: u.uid,
      displayName: u.displayName || '사장님',
      photoURL: u.photoURL || '',
      email: u.email || '',
      isGuest: false
    };
    localStorage.setItem("yakmate_user", JSON.stringify(user));
    window.location.href = "./dashboard.html";
  }
}).catch(e => { console.error("Redirect Result Error:", e); });

document.getElementById("btn-guest").addEventListener("click", () => {
  const g = { uid: "guest_" + Math.random().toString(36).substr(2, 9), displayName: "사장님", isGuest: true };
  localStorage.setItem("yakmate_user", JSON.stringify(g));
  window.location.href = "./dashboard.html";
});
document.getElementById("btn-google").addEventListener("click", async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch (e) { 
    if (e.code === "auth/popup-blocked") await signInWithRedirect(auth, new GoogleAuthProvider());
    else alert("Google Login Error: " + e.message);
  }
});
document.getElementById("btn-kakao").addEventListener("click", () => {
  const errorBox = document.getElementById("error-msg");
  
  if (!window.kakaoInit) {
    errorBox.innerHTML = `[카카오 초기화 실패]<br>카카오 JavaScript 키가 틀렸거나 네트워크 오류입니다.<br><span style="font-size:11px;opacity:0.7">Key: 378387c805534e113c68d0c246933822</span>`;
    errorBox.classList.add("active");
    return;
  }
  
  errorBox.classList.remove("active");
  
  try {
    Kakao.Auth.login({
      success: function(authObj) {
        Kakao.API.request({
          url: "/v2/user/me",
          success: function(data) {
            const user = {
              uid: "kakao_" + data.id,
              displayName: data.kakao_account?.profile?.nickname || "사장님",
              photoURL: data.kakao_account?.profile?.profile_image_url || "",
              isGuest: false
            };
            localStorage.setItem("yakmate_user", JSON.stringify(user));
            window.location.href = "./dashboard.html";
          },
          fail: function(err) { 
            errorBox.innerHTML = `[카카오 프로필 에러]<br>${err.msg || JSON.stringify(err)}`;
            errorBox.classList.add("active");
          }
        });
      },
      fail: function(err) { 
        let errMsg = err.error_description || err.msg || JSON.stringify(err);
        if(err.error === 'access_denied') errMsg = "사용자가 로그인을 취소했거나 권한을 거부했습니다.";
        errorBox.innerHTML = `🚨 <b>[카카오 로그인 에러]</b><br><span style="color:#fff">${err.error || 'ERROR'}</span><br>${errMsg}<br><br><span style="font-size:11px;opacity:0.8">이 메시지를 캡쳐해서 사장님AI에게 알려주세요!</span>`;
        errorBox.classList.add("active");
      }
    });
  } catch (e) {
    errorBox.innerHTML = `🚨 <b>[시스템 에러]</b><br>팝업이 차단되었거나 알 수 없는 오류입니다.<br>${e.message}`;
    errorBox.classList.add("active");
  }
});
</script>
</body>
</html>
