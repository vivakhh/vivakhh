<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YakMate | Story Nudge</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <style>
        body {
            background: var(--bg-main);
            color: var(--on-bg);
            padding-bottom: 140px;
        }

        .header {
            padding: 32px 24px;
            background: transparent;
            z-index: 100;
        }

        .header-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--on-card);
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .count-card {
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            border-radius: 40px;
            padding: 32px;
            text-align: center;
            margin-bottom: 32px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .count-label {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .count-num {
            font-size: 48px;
            font-weight: 900;
            color: var(--on-card);
            font-family: 'Space Grotesk', sans-serif;
        }

        .write-card {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 40px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .write-title {
            font-size: 17px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .write-input {
            width: 100%;
            background: var(--bg-float);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            font-family: inherit;
            font-size: 16px;
            color: var(--on-card);
            resize: none;
            outline: none;
            line-height: 1.7;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .write-input:focus {
            border-color: var(--primary);
        }

        .post-card {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 28px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .post-num {
            font-size: 13px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 12px;
            opacity: 0.8;
        }

        .post-text {
            font-size: 17px;
            color: var(--on-card);
            line-height: 1.7;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .heart-btn {
            background: var(--bg-float);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 10px 20px;
            color: var(--on-card);
            font-weight: 700;
        }

        .heart-btn.liked {
            background: rgba(255, 110, 132, 0.1);
            border-color: #ff6e84;
            color: #ff6e84;
        }
</style>

    <style>
    
    .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        color: rgba(225,226,235,0.4);
        text-decoration: none;
        padding: 8px 12px;
        border-radius: 20px;
        transition: all 0.3s;
        flex: 1;
    }
    body.light-mode .nav-item {
        color: rgba(26,29,35,0.4);
    }
    .nav-item.active {
        color: #D4AF37;
        background: rgba(212,175,55,0.1);
    }
    .nav-icon { font-size: 22px; }
    .nav-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>

<style>/* NAV OVERRIDE */
.nav-bar {
    position: fixed !important;
    bottom: 24px !important;
    left: 50% !important;
    transform: translateX(-50%) !important;
    background: rgba(29,32,38,0.92) !important;
    backdrop-filter: blur(20px) !important;
    border: 1px solid rgba(255,255,255,0.08) !important;
    border-radius: 32px !important;
    padding: 10px 8px !important;
    display: flex !important;
    flex-direction: row !important;
    z-index: 9999 !important;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4) !important;
    width: calc(100% - 48px) !important;
    max-width: 480px !important;
    justify-content: space-around !important;
    grid-template-columns: unset !important;
}
body.light-mode .nav-bar {
    background: rgba(255,255,255,0.95) !important;
    border: 1px solid rgba(0,0,0,0.08) !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12) !important;
}
.nav-item {
    color: rgba(225,226,235,0.4) !important;
}
body.light-mode .nav-item {
    color: rgba(26,29,35,0.4) !important;
}
.nav-item.active {
    color: #D4AF37 !important;
    background: rgba(212,175,55,0.1) !important;
}
</style>
</head>
<body>
<script>
  (function() {
    const theme = localStorage.getItem('yakmate_theme');
    if (theme === 'light') document.body.classList.add('light-mode');
  })();
</script>
    <div class="header">
        <div class="header-title">
            <span class="material-icons-round" style="color:var(--primary); font-size: 32px;">forum</span>
            <span>Story Nudge</span>
        </div>
        <div class="header-desc">따뜻한 마음이 모이는 곳</div>
    </div>

    <div class="content">
        <!-- 따뜻한 가이드 배너 -->
        <div style="background: rgba(212,175,55,0.05); border: 1px dashed var(--primary); border-radius: 20px; padding: 16px; margin-bottom: 32px; display: flex; align-items: center; gap: 12px;">
            <span class="material-icons-round" style="color:var(--primary)">favorite</span>
            <div style="font-size: 13px; font-weight: 700; color: var(--on-card)">
                서로를 향한 따뜻한 응원만 남겨주세요. <br>
                <span style="opacity:0.6; font-size:11px">부적절한 이야기는 '마음 가드'가 가려드려요.</span>
            </div>
        </div>

    <div class="count-card">
        <div class="count-label">함께 지켜가는 따뜻한 Health Promise</div>
        <div><span class="count-num" id="total-count">0</span><span style="font-size: 18px; font-weight: 800; color: var(--on-card);">번</span></div>
        <div style="font-size: 14px; color: var(--text-dim); margin-top: 12px; font-weight: 600;" id="member-count">로딩 중...</div>
    </div>
    
    <div class="write-card">
        <div class="write-title">
            <span class="material-icons-round" style="font-size:22px">edit_note</span>
            <span>오늘의 넛지 남기기</span>
        </div>
        <textarea class="write-input" id="post-input" rows="3" placeholder="오늘 약속은 잘 지키셨나요? 사장님의 따뜻한 한 마디를 들려주세요. 😊"></textarea>
        
        <button class="write-btn" id="post-btn" style="width: 100%; margin-top: 24px; padding: 20px; background: var(--primary); color: #fff; border: none; border-radius: 20px; font-size: 16px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 25px var(--primary-glow);">기록 남기기</button>
    </div>

    <div style="font-size: 14px; font-weight: 800; color: var(--text-dim); margin-bottom: 24px; padding-left: 12px; letter-spacing: 1px;">실시간 따뜻한 소식</div>
    <div id="post-list"></div>
</div>

<nav class="nav-bar">
    <a href="dashboard.html" class="nav-item">
        <span class="material-icons-round">home</span>
        <span>Home</span>
    </a>
    <a href="stats.html" class="nav-item">
        <span class="material-icons-round">analytics</span>
        <span>Health Promise</span>
    </a>
    <a href="community.html" class="nav-item active">
        <span class="material-icons-round">forum</span>
        <span>Story Nudge</span>
    </a>
    <a href="settings.html" class="nav-item">
        <span class="material-icons-round">person</span>
        <span>My Center</span>
    </a>
</nav>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-auth.js";
import{getFirestore,collection,addDoc,onSnapshot,doc,updateDoc,arrayUnion,arrayRemove,query,orderBy,limit,getDoc,setDoc,increment}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-firestore.js";

const config={apiKey:"AIzaSyDpnPJnErnrTloHk3HFrsXHORUMvAiOq5w",authDomain:"pill-sajangnim.firebaseapp.com",projectId:"pill-sajangnim",storageBucket:"pill-sajangnim.firebasestorage.app",messagingSenderId:"648268791992",appId:"1:648268791992:web:41a92580aa1a58ae6bb44d"};
const app=initializeApp(config);
const auth=getAuth(app);
const db=getFirestore(app);
let currentUser=null;

function maskName(name){
  if(!name)return'익명***';
  const parts=name.split(' ');
  const first=parts[0];
  if(first.length<=2)return first[0]+'***';
  return first.substring(0,3)+'***';
}

function timeAgo(date){
  const diff=Math.floor((new Date()-date)/1000);
  if(diff<60)return'방금 전';
  if(diff<3600)return Math.floor(diff/60)+'분 전';
  if(diff<86400)return Math.floor(diff/3600)+'시간 전';
  return Math.floor(diff/86400)+'일 전';
}

onAuthStateChanged(auth,async(u)=>{
  let user = u;
  if(!user){
    const storedUser = localStorage.getItem('yakmate_user');
    if(storedUser) user = JSON.parse(storedUser);
  }
  if(!user){window.location.href='./index.html';return;}
  currentUser=user;

  onSnapshot(doc(db,'stats','global'),snap=>{
    if(snap.exists()){
      const d=snap.data();
      document.getElementById('total-count').textContent=(d.totalPosts||0).toLocaleString();
      document.getElementById('member-count').textContent=(d.totalMembers||0).toLocaleString()+'명의 사장님과 함께합니다';
    }
  });

  const q=query(collection(db,'community_posts'),orderBy('postNum','desc'),limit(20));
  onSnapshot(q,snapshot=>{
    const list=document.getElementById('post-list');
    list.innerHTML='';
    if(snapshot.empty){
      list.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--text-dim);font-size:15px;line-height:1.6;">아직 소식이 없네요.<br>사장님이 첫 번째 넛지를 남겨보세요! 🍬</div>';
      return;
    }
    snapshot.forEach(docSnap=>{
      const d=docSnap.data();
      const uid = currentUser.uid || currentUser.id;
      const liked=d.likes?.includes(uid);
      const div=document.createElement('div');
      div.className='post-card';
      div.innerHTML=`
        <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:12px;">
            <div class="post-num">${(d.postNum||0).toLocaleString()}번째 Health Promise 🏆</div>
            <button class="material-icons-round" style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:18px;" onclick="reportPost('${docSnap.id}')">more_vert</button>
        </div>
        <div class="post-text">${d.text}</div>
        <div style="display:flex; align-items:center; justify-content:space-between;">
          <div style="display:flex; align-items:center; gap:8px;">
            <div style="width:24px; height:24px; background:var(--bg-float); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:var(--primary); border:1px solid var(--border);">
              ${d.userName ? d.userName[0] : '익'}
            </div>
            <span style="font-size:13px; color:var(--text-dim); font-weight:700;">${maskName(d.userName)}</span>
            <span style="font-size:13px; color:var(--text-dim); opacity:0.5;">· ${d.createdAt?timeAgo(d.createdAt.toDate()):'방금 전'}</span>
          </div>
          <button class="heart-btn ${liked?'liked':''}" data-id="${docSnap.id}" style="display:flex; align-items:center; gap:6px; cursor:pointer; outline:none; transition:all 0.2s;">
            <span class="material-icons-round" style="font-size:18px">${liked?'favorite':'favorite_border'}</span>
            <span style="font-size:13px; font-weight:800;">${d.likes?.length||0}</span>
          </button>
        </div>
      `;
      div.querySelector('.heart-btn').onclick=async()=>{
        const ref=doc(db,'community_posts',docSnap.id);
        if(liked){await updateDoc(ref,{likes:arrayRemove(uid)});}
        else{await updateDoc(ref,{likes:arrayUnion(uid)});}
      };
      list.appendChild(div);
    });
  });

  window.reportPost = function(postId) {
    if(confirm('이 이야기를 "마음 가드"에게 전달할까요?\n부적절한 내용은 즉시 검토 후 조치됩니다.')) {
        alert('전달되었습니다. 따뜻한 공간을 함께 지켜주셔서 감사합니다. ✨');
    }
  };
});

document.getElementById('post-btn').addEventListener('click',async()=>{
  const text=document.getElementById('post-input').value.trim();
  if(!text||!currentUser)return;

  const counterRef=doc(db,'stats','global');
  const snap=await getDoc(counterRef);
  
  let postNum=1;
  if(snap.exists()) postNum=(snap.data().totalPosts||0)+1;

  await addDoc(collection(db,'community_posts'),{
    text,
    userName:currentUser.displayName||'사장님',
    userId:currentUser.uid,
    postNum,
    likes:[],
    createdAt:new Date()
  });

  if(snap.exists()){
    await updateDoc(counterRef,{totalPosts:increment(1)});
  }else{
    await setDoc(counterRef,{totalPosts:1,totalMembers:1});
  }

  document.getElementById('post-input').value='';
});

window.addQuickText = (text) => {
    document.getElementById('post-input').value = text;
};
</script>
</body>
</html>
