<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YakMate | 우리 이야기</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root {
    --primary-container: #00e5ff;
    --background: #0b0e14;
    --surface-container: #1d2026;
    --surface-high: #272a31;
    --on-surface: #e1e2eb;
    --glass: rgba(29, 32, 38, 0.7);
    --gold: #D4AF37;
}

body.light-mode {
    --background: #fdfdfd;
    --on-surface: #1a1d23;
    --surface-container: #ffffff;
    --surface-high: #f0f2f5;
    --glass: rgba(255, 255, 255, 0.9);
    --gold: #8d6e63;
    --primary-container: #7c4dff;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
body { 
    font-family: 'Manrope', 'Noto Sans KR', sans-serif; 
    background: var(--background); 
    color: var(--on-surface);
    min-height: 100vh;
    padding-bottom: 120px;
}

.header { padding: 32px 24px; position: sticky; top: 0; background: rgba(11, 14, 20, 0.8); backdrop-filter: blur(20px); z-index: 100; }
.header-title { font-size: 24px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 12px; }

.content { padding: 0 24px; }

.count-card { 
    background: linear-gradient(135deg, rgba(0, 229, 255, 0.1) 0%, rgba(124, 77, 255, 0.1) 100%); 
    border-radius: 32px; 
    padding: 24px; 
    text-align: center; 
    margin-bottom: 24px;
    border: 1px solid rgba(0, 229, 255, 0.1);
}
.count-label { font-size: 13px; font-weight: 600; opacity: 0.6; margin-bottom: 8px; letter-spacing: 0.5px; }
.count-num { font-size: 40px; font-weight: 800; color: var(--primary-container); font-family: 'Space Grotesk', sans-serif; }
.count-unit { font-size: 16px; font-weight: 700; color: var(--primary-container); margin-left: 2px; }
.count-sub { font-size: 12px; color: #fff; opacity: 0.4; margin-top: 8px; font-weight: 500; }

.write-card { 
    background: var(--glass); 
    border-radius: 28px; 
    padding: 20px; 
    margin-bottom: 24px; 
    border: 1px solid rgba(255, 255, 255, 0.05); 
}
.write-title { font-size: 16px; font-weight: 700; color: var(--gold); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.write-input { 
    width: 100%; 
    background: rgba(255, 255, 255, 0.02); 
    border: 1px solid rgba(255, 255, 255, 0.05); 
    border-radius: 20px; 
    padding: 18px; 
    font-family: inherit; 
    font-size: 15px; 
    color: #fff; 
    resize: none; 
    outline: none; 
    transition: all 0.3s; 
}
.write-input:focus { border-color: var(--primary-container); background: rgba(0, 229, 255, 0.03); }
.write-btn { 
    width: 100%; 
    margin-top: 16px; 
    padding: 16px; 
    background: var(--primary-container); 
    color: #000; 
    border: none; 
    border-radius: 16px; 
    font-size: 15px; 
    font-weight: 700; 
    cursor: pointer; 
    transition: all 0.3s; 
}
.write-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 229, 255, 0.3); }

.posts-label { font-size: 13px; font-weight: 700; color: rgba(255, 255, 255, 0.3); margin-top: 32px; margin-bottom: 16px; padding-left: 16px; letter-spacing: 1px; }

.post-card { 
    background: var(--glass); 
    border-radius: 28px; 
    padding: 24px; 
    margin: 0 12px 16px 12px; 
    border: 1px solid rgba(255, 255, 255, 0.03); 
    transition: transform 0.3s;
}
.post-num { font-size: 12px; font-weight: 700; color: var(--primary-container); margin-bottom: 8px; opacity: 0.8; }
.post-text { font-size: 16px; color: #fff; line-height: 1.6; margin-bottom: 20px; font-weight: 500; }
.post-footer { display: flex; align-items: center; justify-content: space-between; }
.post-name { font-size: 12px; color: rgba(255, 255, 255, 0.3); font-weight: 600; }
.post-time { font-size: 12px; color: rgba(255, 255, 255, 0.2); }

.heart-btn { 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    background: rgba(255, 255, 255, 0.03); 
    border: 1px solid rgba(255, 255, 255, 0.05); 
    border-radius: 50px; 
    padding: 8px 16px; 
    cursor: pointer; 
    transition: all 0.3s; 
    color: #fff;
}
.heart-btn.liked { background: rgba(255, 110, 132, 0.1); border-color: rgba(255, 110, 132, 0.2); color: #ff6e84; }
.heart-count { font-size: 13px; font-weight: 700; }

.bottom-nav { position: fixed; bottom: 24px; left: 24px; right: 24px; background: rgba(16, 19, 26, 0.9); backdrop-filter: blur(20px); border-radius: 24px; padding: 12px; display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid rgba(255, 255, 255, 0.05); z-index: 100; }
.nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(225, 226, 235, 0.3); font-size: 11px; text-decoration: none; gap: 4px; transition: all 0.3s; }
.nav-item.active { color: var(--primary-container); }
.nav-icon { font-size: 22px; }

.reaction-group { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.reaction-chip { 
    background: rgba(255, 255, 255, 0.03); 
    border: 1px solid rgba(255, 255, 255, 0.05); 
    border-radius: 50px; 
    padding: 6px 12px; 
    font-size: 13px; 
    cursor: pointer; 
    transition: all 0.3s; 
    display: flex; 
    align-items: center; 
    gap: 4px;
}
.reaction-chip:hover { background: rgba(255, 255, 255, 0.08); transform: scale(1.05); }
.reaction-chip.active { background: rgba(0, 229, 255, 0.1); border-color: var(--primary-container); }

.quick-cheer-group { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
.quick-cheer-group::-webkit-scrollbar { display: none; }
.quick-btn { 
    background: rgba(255, 255, 255, 0.05); 
    border: 1px solid rgba(255, 255, 255, 0.05); 
    color: #fff; 
    padding: 8px 16px; 
    border-radius: 50px; 
    font-size: 13px; 
    font-weight: 600; 
    white-space: nowrap; 
    cursor: pointer; 
    transition: all 0.3s;
}
.quick-btn:hover { background: var(--primary-container); color: #000; }

/* Light Mode Overrides */
body.light-mode .header { background: rgba(253, 253, 253, 0.8); }
body.light-mode .header-title { color: #1a1d23; }
body.light-mode .post-card { background: #fff; border: 1px solid rgba(0, 0, 0, 0.05); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }
body.light-mode .post-num { color: #7c4dff; }
body.light-mode .post-text { color: #1a1d23; }
body.light-mode .post-name { color: #1a1d23; }
body.light-mode .post-time { color: rgba(0,0,0,0.4); }
body.light-mode .bottom-nav { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0, 0, 0, 0.05); }
body.light-mode .nav-item { color: rgba(0, 0, 0, 0.3); }
body.light-mode .nav-item.active { color: #7c4dff; }
body.light-mode .count-card { background: linear-gradient(135deg, rgba(124,77,255,0.08) 0%, rgba(124,77,255,0.04) 100%); }
body.light-mode .count-label { color: #1a1d23; }
body.light-mode .count-sub { color: rgba(0,0,0,0.4); }
body.light-mode .write-card { background: #fff; border: 1px solid rgba(0,0,0,0.06); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
body.light-mode .write-title { color: #8d6e63; }
body.light-mode .write-input { background: #f5f5f5; border-color: rgba(0,0,0,0.08); color: #1a1d23; }
body.light-mode .write-input::placeholder { color: rgba(0,0,0,0.3); }
body.light-mode .quick-btn { background: #f0f0f0; border-color: rgba(0,0,0,0.08); color: #1a1d23; }
body.light-mode .posts-label { color: rgba(0,0,0,0.3); }
body.light-mode .heart-btn { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.08); color: #1a1d23; }
body.light-mode .count-card { background: linear-gradient(135deg, rgba(124,77,255,0.08) 0%, rgba(124,77,255,0.04) 100%); }
body.light-mode .count-label { color: #1a1d23; }
body.light-mode .count-sub { color: rgba(0,0,0,0.4); }
body.light-mode .write-card { background: #fff; border: 1px solid rgba(0,0,0,0.06); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
body.light-mode .write-title { color: #8d6e63; }
body.light-mode .write-input { background: #f5f5f5; border-color: rgba(0,0,0,0.08); color: #1a1d23; }
body.light-mode .write-input::placeholder { color: rgba(0,0,0,0.3); }
body.light-mode .quick-btn { background: #f0f0f0; border-color: rgba(0,0,0,0.08); color: #1a1d23; }
body.light-mode .posts-label { color: rgba(0,0,0,0.3); }
body.light-mode .heart-btn { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.08); color: #1a1d23; }
</style>
</head>
<body>
<script>
  (function() {
    const theme = localStorage.getItem('yakmate_theme');
    if (theme === 'light') document.body.classList.add('light-mode');
  })();
</script>
<div class="header">
    <div class="header-title">
        <span class="material-icons-round" style="color:var(--primary-container)">public</span>
        <span>우리 이야기</span>
    </div>
</div>

<div class="content">
  <div class="count-card">
    <div class="count-label">우리가 함께 지킨 건강 약속</div>
    <div><span class="count-num" id="total-count">0</span><span class="count-unit">번</span></div>
    <div class="count-sub" id="member-count">로딩 중...</div>
  </div>
  
  <div class="write-card">
    <div class="write-title">
        <span class="material-icons-round" style="font-size:18px">edit_note</span>
        <span>오늘 한 마디 남기기</span>
    </div>
    <textarea class="write-input" id="post-input" rows="3" placeholder="오늘 약은 잘 챙겨 드셨나요? 기분 좋은 한 마디 남겨주세요. 😊"></textarea>
    
    <button class="write-btn" id="post-btn">기록 올리기</button>
  </div>

  <!-- 커뮤니티 피드 섹션 -->
  <div class="posts-label" id="posts-label">실시간 소식</div>
  <div id="post-list"></div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="location.href='dashboard.html'"><span class="nav-icon material-icons-round">home</span><span>홈</span></div>
  <div class="nav-item" onclick="location.href='stats.html'"><span class="nav-icon material-icons-round">bar_chart</span><span>건강 기록</span></div>
  <div class="nav-item active"><span class="nav-icon material-icons-round">group</span><span>우리 이야기</span></div>
  <div class="nav-item" onclick="location.href='settings.html'"><span class="nav-icon material-icons-round">settings</span><span>설정</span></div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-auth.js";
import{getFirestore,collection,addDoc,onSnapshot,doc,updateDoc,arrayUnion,arrayRemove,query,orderBy,limit,getDoc,setDoc,increment}from"https://www.gstatic.com/firebasejs/9.17.2/firebase-firestore.js";

const config={apiKey:"AIzaSyDpnPJnErnrTloHk3HFrsXHORUMvAiOq5w",authDomain:"pill-sajangnim.firebaseapp.com",projectId:"pill-sajangnim",storageBucket:"pill-sajangnim.firebasestorage.app",messagingSenderId:"648268791992",appId:"1:648268791992:web:41a92580aa1a58ae6bb44d"};
const app=initializeApp(config);
const auth=getAuth(app);
const db=getFirestore(app);
let currentUser=null;

function maskName(name){
  if(!name)return'익명***';
  const parts=name.split(' ');
  const first=parts[0];
  if(first.length<=2)return first[0]+'***';
  return first.substring(0,3)+'***';
}

function timeAgo(date){
  const diff=Math.floor((new Date()-date)/1000);
  if(diff<60)return'방금 전';
  if(diff<3600)return Math.floor(diff/60)+'분 전';
  if(diff<86400)return Math.floor(diff/3600)+'시간 전';
  return Math.floor(diff/86400)+'일 전';
}

onAuthStateChanged(auth,async(u)=>{
  let user = u;
  if(!user){
    const kakaoData = localStorage.getItem('yakmate_kakao_user');
    if(kakaoData) user = JSON.parse(kakaoData);
  }
  if(!user){window.location.href='./index.html';return;}
  currentUser=user;

  onSnapshot(doc(db,'stats','global'),snap=>{
    if(snap.exists()){
      const d=snap.data();
      document.getElementById('total-count').textContent=(d.totalPosts||0).toLocaleString();
      document.getElementById('member-count').textContent=(d.totalMembers||0).toLocaleString()+'명의 사장님과 함께 합니다';
    }
  });

  const q=query(collection(db,'community_posts'),orderBy('postNum','desc'),limit(10));
  onSnapshot(q,snapshot=>{
    const list=document.getElementById('post-list');
    list.innerHTML='';
    if(snapshot.empty){
      list.innerHTML='<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.2);font-size:14px">첫 번째로 한 마디 남겨보세요! 💊</div>';
      return;
    }
    snapshot.forEach(docSnap=>{
      const d=docSnap.data();
      const liked=d.likes?.includes(currentUser.uid);
      const div=document.createElement('div');
      div.className='post-card';
      div.innerHTML=`
        <div class="post-num">${(d.postNum||0).toLocaleString()}번째 약 챙기기 ✨</div>
        <div class="post-text">${d.text}</div>
        <div class="post-footer">
          <div>
            <span class="post-name">${maskName(d.userName)}</span>

            <span class="post-time"> · ${d.createdAt?timeAgo(d.createdAt.toDate()):'방금 전'}</span>
          </div>
          <div style="display:flex;gap:8px">
            <button class="heart-btn ${liked?'liked':''}" data-id="${docSnap.id}">
              <span class="material-icons-round" style="font-size:16px">${liked?'favorite':'favorite_border'}</span>
              <span class="heart-count">${d.likes?.length||0}</span>
            </button>
          </div>
        </div>
      `;
      div.querySelector('.heart-btn').onclick=async()=>{
        const ref=doc(db,'community_posts',docSnap.id);
        if(liked){await updateDoc(ref,{likes:arrayRemove(currentUser.uid)});}
        else{await updateDoc(ref,{likes:arrayUnion(currentUser.uid)});}
      };
      list.appendChild(div);
    });
  });
});

document.getElementById('post-btn').addEventListener('click',async()=>{
  const text=document.getElementById('post-input').value.trim();
  if(!text||!currentUser)return;

  const counterRef=doc(db,'stats','global');
  const snap=await getDoc(counterRef);
  
  let postNum=1;
  if(snap.exists()) postNum=(snap.data().totalPosts||0)+1;

  await addDoc(collection(db,'community_posts'),{
    text,
    userName:currentUser.displayName||'사장님',
    userId:currentUser.uid,
    postNum,
    likes:[],
    createdAt:new Date()
  });

  if(snap.exists()){
    await updateDoc(counterRef,{totalPosts:increment(1)});
  }else{
    await setDoc(counterRef,{totalPosts:1,totalMembers:1});
  }

  document.getElementById('post-input').value='';
});

window.addQuickText = (text) => {
    document.getElementById('post-input').value = text;
};
</script>
</body>
</html>
